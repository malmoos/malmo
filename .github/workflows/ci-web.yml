# CI gate for the web-ui dashboard: typecheck + production build.
#
# Triggers on PRs into dev or main, and only when web-ui/ changes (path
# filter) — Go-only / docs-only PRs don't spin a runner. `dev` is the default
# branch and gates ordinary feature PRs; `main` gates the dev->main PR that
# cuts a release, so a release can't merge ungated. PR-only by design: every
# change lands via PR, so a push trigger would just double-run.
name: CI / web-ui

on:
  pull_request:
    branches: [dev, main]
    paths:
      - "web-ui/**"
      - "api/**"
      - ".github/workflows/ci-web.yml"

# Cancel superseded runs on the same ref (e.g. force-pushes to a PR branch).
concurrency:
  group: ci-web-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web-ui:
    name: web-ui — typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-ui
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version-file: web-ui/.nvmrc
          cache: npm
          cache-dependency-path: web-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Regenerate the TS client from the committed spec (api/openapi.json) and
      # fail if the checked-in copy is stale — mirrors the Go job's openapi-check
      # so the generated client can't drift from the schema (BRAIN_UI_PROTOCOL.md
      # # Codegen).
      - name: OpenAPI client freshness
        run: |
          npm run gen:api
          git diff --exit-code src/generated/openapi.ts

      # `npm run build` runs `vue-tsc --noEmit` (typecheck) then `vite build`.
      - name: Typecheck + build
        run: npm run build
