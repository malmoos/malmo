# Build the hosted cloud-VM image with mkosi, prove the brain accepts the CURRENT
# first-boot seed schema (seeded QEMU boot), assert it stays lean, then publish it
# to Hetzner as a snapshot and print the snapshot id.
#
# Three triggers, three intents:
#   - `workflow_call` — the AUTOMATED release path. `release.yml` runs on every
#     push to `main`; when it finds `VERSION` names a version with no matching
#     tag yet, it creates the tag + GitHub Release itself, THEN calls this
#     workflow with `publish: true` (`secrets: inherit`) to build and publish
#     the image for that same commit. This is the path a release actually
#     takes now — read on for why it isn't the `push: tags` trigger below.
#   - `push: tags: v*` — the MANUAL escape hatch: a human pushing a `vX.Y.Z`
#     tag by hand (e.g. re-cutting an image for an already-tagged release
#     without touching `release.yml`). Deliberately KEPT alongside
#     `workflow_call` rather than replaced by it, for a reason that is easy to
#     "fix" into a bug if you don't know it: a tag created by `release.yml`
#     using the default `GITHUB_TOKEN` does NOT fire this `push: tags`
#     trigger — GitHub deliberately suppresses events from a `GITHUB_TOKEN`-
#     authored push to prevent recursive workflow runs. That's *why*
#     `release.yml` can't just push the tag and rely on this trigger to pick
#     it up (it would silently never build/publish); it has to invoke this
#     workflow directly via `workflow_call` instead. The upshot: the two
#     triggers can never fire for the same tag-creation event, so there is no
#     double-build risk from keeping both — `push: tags` only ever fires for a
#     human-originated tag push (a PAT or a person's own `git push --tags`),
#     never for the auto-tag `release.yml` creates.
#   - `workflow_dispatch` — manual, on-demand, ad hoc ref. The `publish` input
#     still governs whether the run publishes (default true); `publish=false`
#     gives a build-only smoke run. Unchanged from before tags existed.
#
# All three share one `publish` input name/shape (`workflow_dispatch` and
# `workflow_call` inputs both surface as the same `inputs.*` context), which
# is why `SHOULD_PUBLISH` below needs no per-trigger special-casing for the
# call path: `inputs.publish` already carries the right value regardless of
# whether a human or `release.yml` set it.
#
# Either way the full build is expensive (~40 min) and a publish is a
# deliberate act, not a per-push one.
#
# Closes the gap #189/#238 carried: until now the cloud image had NO automated
# build — `make build-cloud-image` ran only by hand, and on an Ubuntu 24.04 box
# mkosi 26's rootless sandbox dies before it starts (PR_CAPBSET_DROP EPERM) under
# the AppArmor unprivileged-userns restriction. This lane makes the build run on
# demand instead.
#
# Why the seeded-boot gate exists: a cloud-image build can ship a brain that
# rejects the live seed — e.g. one that still required the old
# admin_bootstrap_secret after the SSO change removed it. Such a box boots, never
# configures wildcard TLS, and provisioning hangs at the SSL step. The seeded QEMU
# boot asserts the brain logs 'provisioning seed ingested', AND — since the seed
# now carries a complete (inert, air-gapped) acme-dns enrollment — that the brain
# applies its wildcard-TLS pass: 'caddy: wildcard TLS configured' is logged and
# :443 binds (cloud-assertions.sh 'seeded'; #278). Real cert issuance can't run
# air-gapped, so this gates config application, not a live cert. A stale/skewed
# brain fails there and is never published. A fresh runner (no .dev/ cache) also
# rebuilds the control-plane images from source, so the "image labeled new, brain
# baked old" skew cannot recur.
#
# Manual runs: trigger from the Actions tab or `gh workflow run "CI / Cloud
# image"`. The run prints `MALMO_HETZNER_IMAGE=<id>`; set that on the
# control-plane and deploy.
#
# Required secret: HCLOUD_TOKEN — a Hetzner Cloud API token (publish only).
#
# On the same publish gate, the build also attaches the image to the tagged
# GitHub Release as a release asset (compressed image + checksum) — a
# release should carry its own reproducible, provider-neutral built
# artifact, fetchable by anyone from the release page alone, no Hetzner
# account required. Purely additive alongside the Hetzner publish above: it
# reuses the same compressed file rather than building or compressing a
# second time, and needs no new secret (the job's own GITHUB_TOKEN, granted
# `contents: write` below, is enough to attach an asset to a release).
name: CI / Cloud image

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish the built image to Hetzner as a snapshot"
        type: boolean
        default: true
  workflow_call:
    inputs:
      publish:
        description: "Publish the built image to Hetzner as a snapshot"
        type: boolean
        default: true

# contents: write is the minimum grant for `gh release upload`/`gh release
# create` in the release-asset step below; nothing else in this workflow
# needs write access.
permissions:
  contents: write

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-cloud-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cloud-image:
    name: Build + seeded-boot test + publish hosted cloud image
    # Single source of truth for "should this run publish", computed once so
    # the 3 publish-gated steps below can't drift out of sync with each other.
    # A real tag push always publishes (that's the point of tagging a release);
    # a workflow_dispatch OR workflow_call run publishes iff its `publish`
    # input says so. On a `push` event `inputs.publish` is undefined, which is
    # why the tag-push half of the OR is needed — `inputs.publish` alone would
    # evaluate falsy and silently skip publishing on every tagged release.
    # `workflow_call` and `workflow_dispatch` both populate the SAME `inputs`
    # context under the same input name (`publish`), so `release.yml` calling
    # this workflow with `publish: true` flows through the `inputs.publish`
    # half identically to a human running `workflow_dispatch publish=true`.
    #
    # `startsWith(github.ref, 'refs/tags/')` is LOAD-BEARING, not
    # belt-and-braces. In a reusable workflow the `github` context is the
    # CALLER's, not this workflow's: when release.yml (triggered by
    # `push: branches: [main]`) calls us, github.event_name here is `push` and
    # github.ref is `refs/heads/main`. Keyed on event_name alone this would
    # collapse to "any call from a push-triggered workflow publishes",
    # ignoring `publish` entirely — a future caller passing publish=false
    # would publish anyway. Keyed on the ref, the only path that publishes
    # without an explicit input is a genuine tag push.
    env:
      SHOULD_PUBLISH: ${{ (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) || inputs.publish }}
    # Pin 24.04 explicitly: this is the exact environment that reproduces the
    # mkosi-sandbox EPERM (#189), so the fix has to be proven here, not on a
    # floating ubuntu-latest.
    runs-on: ubuntu-24.04
    # Two mkosi builds (production image + QEMU test image), three QEMU boots, and
    # the rescue-server publish. Generous vs the old build-only 40m cap.
    timeout-minutes: 120
    outputs:
      image_id: ${{ steps.publish.outputs.image_id }}
    steps:
      - uses: actions/checkout@v5

      # Fail FAST on a mistagged release, before the ~40min build below runs.
      # VERSION (repo root) is the single source of truth for the monorepo's
      # one version (BUILD.md # Versioning, DECISIONS.md 2026-07-16); a `v*`
      # tag push is only a real release if it matches. workflow_dispatch has no
      # tag (github.ref_name is the branch/ref it ran against), so this only
      # runs — and only can fail — on a genuine `push: tags: v*` trigger.
      #
      # Both halves of the condition are required. In a reusable workflow the
      # `github` context is the CALLER's: when release.yml (triggered by
      # `push: branches: [main]`) calls us, github.event_name here is `push`
      # — NOT `workflow_call` — and github.ref is `refs/heads/main`. Gating on
      # event_name alone would therefore run this step on the auto-release
      # path and compare `main` against `v<VERSION>`, failing EVERY
      # auto-release immediately after release.yml had already pushed the tag
      # and cut the GitHub Release — a tagged release with no image. Keying on
      # the ref being an actual tag is what separates a real tag push from a
      # call made on a branch. On the call path there is nothing to assert
      # anyway: release.yml derives the tag from VERSION itself, so they are
      # equal by construction.
      - name: Assert the pushed tag matches VERSION
        if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/') }}
        run: |
          set -euo pipefail
          want="v$(cat VERSION)"
          if [ "${{ github.ref_name }}" != "$want" ]; then
            echo "::error::tag ${{ github.ref_name }} does not match VERSION ($want) — the release PR must bump VERSION before tagging."
            exit 1
          fi
          echo "tag ${{ github.ref_name }} matches VERSION"

      # mkosi 26 builds rootless: it unshares a user namespace and drops
      # capabilities inside it. Ubuntu 24.04 ships
      # kernel.apparmor_restrict_unprivileged_userns=1, which hands an unconfined
      # process a userns with no CAP_SETPCAP, so mkosi's PR_CAPBSET_DROP returns
      # EPERM and the build dies at sandbox bring-up (#189). Relaxing the knob is
      # safe on an ephemeral runner.
      - name: Relax AppArmor unprivileged-userns restriction
        run: |
          knob=/proc/sys/kernel/apparmor_restrict_unprivileged_userns
          echo "before: $(cat "$knob" 2>/dev/null || echo 'n/a')"
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
          echo "after:  $(cat "$knob")"

      # Host tooling mkosi needs to bootstrap a Debian tools tree and build
      # rootless (uidmap/mmdebstrap/keyring; dosfstools/mtools for the ESP;
      # squashfs-tools/e2fsprogs for the root; systemd-container for the nspawn
      # build sandbox; libpam0g-dev for the slim host-agent-real CGO build).
      - name: Install mkosi and image-build tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            uidmap mmdebstrap debian-archive-keyring \
            dosfstools mtools squashfs-tools e2fsprogs systemd-container \
            libpam0g-dev
          git clone --depth=1 --branch v26 \
            https://github.com/systemd/mkosi.git /tmp/mkosi-src
          sudo ln -sf /tmp/mkosi-src/bin/mkosi /usr/local/bin/mkosi

      # QEMU + UEFI firmware for the seeded-boot test lane (run-cloud-tests.sh).
      # GitHub-hosted Linux runners expose /dev/kvm; the lane uses it when present
      # and falls back to TCG otherwise (slower, still correct).
      - name: Install QEMU + OVMF for the seeded-boot test
        run: |
          sudo apt-get install -y qemu-system-x86 qemu-utils ovmf
          echo "kvm: $(ls -l /dev/kvm 2>/dev/null || echo 'none — test lane will use TCG')"

      - name: Versions
        run: |
          mkosi --version
          git -C /tmp/mkosi-src log --oneline -1
          echo "subuid: $(grep "^$(id -un):" /etc/subuid || echo MISSING)"
          echo "subgid: $(grep "^$(id -un):" /etc/subgid || echo MISSING)"

      # Fast isolation of the #189 fix: exercise exactly the sandbox code path that
      # EPERM'd (acquire_privileges -> drop_capabilities) before the full build.
      - name: mkosi sandbox smoke (validates the userns fix in isolation)
        run: mkosi sandbox -- true

      # Absolute path to the runner's go, for the access boot's host-side assertion
      # mint (see the boot-test step). Resolved as a step output so a runner image
      # that moves go doesn't silently fall back to the script's guesses.
      - name: Resolve go (for the access boot's assertion mint)
        id: go
        run: |
          go_bin="$(command -v go)"
          echo "go-bin=${go_bin}" >> "$GITHUB_OUTPUT"
          echo "go: ${go_bin} ($("$go_bin" version))"

      # 1. Build the production image that will be published. A fresh checkout has
      #    no .dev/ cache, so make rebuilds the control-plane images (brain/ui)
      #    from source — this is what removes the stale-cached-brain failure mode.
      - name: Build the hosted cloud image (+ lean check)
        run: make build-cloud-image

      # 2. SEEDED-BOOT GATE. Boot the image under QEMU with a current-schema seed
      #    and assert the brain ingests it (cloud-assertions.sh 'seeded' boot). A
      #    brain that rejects the live seed fails here -> nothing is published. The
      #    test image reuses the control-plane bundle built in step 1, so it
      #    exercises the same brain that ships.
      # Scope to unseeded + seeded + bios + access — four boots, each guarding a
      # regression that must never reach publish:
      #   - unseeded + seeded: the regression this gate was built for — the built
      #     image's brain accepting the current seed schema.
      #   - bios (#277): re-boots the same image under legacy BIOS (SeaBIOS). A box
      #     landed on a Hetzner CX (Intel) type is unbootable otherwise, and the
      #     OVMF-only lane cannot catch it.
      #   - access (#308): the ONLY real-Caddy proof of the hosted per-app
      #     forward-auth gate + whole-Cookie-header strip (#305/#306) — a gate that is
      #     ON BY DEFAULT for every hosted app (docs/specs/DECISIONS.md 2026-07-08
      #     flipped the default to `restricted` ahead of this proof). A security
      #     invariant whose only net runs when a developer remembers to run it by hand
      #     is not a net, so a box that leaks its forward-auth cookie to an app
      #     upstream must fail HERE and never publish.
      #
      # The frozen-identity boot stays out: it is orthogonal (it checks a re-delivered
      # seed is ignored on a later boot) and has shown a flaky false "re-ingested"
      # verdict whose root cause is still open, so it is left to the full local run
      # (MALMO_CLOUD_BOOTS default = all) rather than blocking publish.
      #
      # GO: the access boot mints its test-portal owner assertion on the HOST
      # (dev/cloud/mkassertion — the private key never enters the VM). The lane runs
      # under `sudo -E`, and sudo's secure_path resets PATH, so `go` on the runner's
      # PATH is invisible to the script; pass it explicitly (run-cloud-tests.sh
      # honours ${GO:-}, and -E preserves it).
      - name: Boot test (seed schema + BIOS/UEFI + per-app access modes through real Caddy)
        env:
          MALMO_CLOUD_BOOTS: "unseeded seeded bios access"
          GO: ${{ steps.go.outputs.go-bin }}
        run: make test-cloud-qemu

      # ---- publish to Hetzner (only when requested) --------------------------

      - name: Set up Go (for hcloud-upload-image)
        if: ${{ env.SHOULD_PUBLISH == 'true' }}
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install hcloud-upload-image
        if: ${{ env.SHOULD_PUBLISH == 'true' }}
        run: |
          go install github.com/apricote/hcloud-upload-image@latest
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      # Hetzner Cloud has no native custom-image upload API: a snapshot is made by
      # booting a throwaway rescue server, dd'ing the image onto its disk, and
      # snapshotting it. apricote/hcloud-upload-image does that dance. We tag the
      # snapshot with a unique label so its id is resolvable deterministically
      # afterwards (the tool only logs it). The .raw built in step 1 lives under
      # .dev/cloud/; we xz it for a smaller upload.
      - name: Publish image to Hetzner + resolve snapshot id
        id: publish
        if: ${{ env.SHOULD_PUBLISH == 'true' }}
        env:
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
        run: |
          set -euo pipefail
          [ -n "${HCLOUD_TOKEN:-}" ] || { echo "::error::HCLOUD_TOKEN secret not set"; exit 1; }

          raw="$(ls -t .dev/cloud/*.raw 2>/dev/null | head -n1 || true)"
          [ -n "$raw" ] && [ -f "$raw" ] || { echo "::error::no .raw under .dev/cloud/ (build failed?)"; exit 1; }
          echo "image: $raw ($(du -h "$raw" | cut -f1))"
          xz -T0 -c -- "$raw" > "$raw.xz"
          echo "compressed: $(du -h "$raw.xz" | cut -f1)"

          run_id="$(date +%Y%m%d-%H%M%S)"
          os_rev="$(git rev-parse --short HEAD)"
          # VERSION is the single source of truth for what was built (BUILD.md #
          # Versioning) regardless of trigger: on a tag push it's already
          # asserted equal to the tag (the early gate step above), and on a
          # workflow_dispatch build-only/build+publish run it's still the real
          # version of the checked-out commit — not "bogus" the way the old
          # tag-only label was on a non-tag trigger, so it's labeled
          # unconditionally rather than only when a tag happened to trigger the
          # run.
          malmo_version="$(cat VERSION)"
          # Lead with the version: `desc` is what the Hetzner console shows as
          # the snapshot's name in the images list, so the first thing you read
          # should be which malmo this is. run_id keeps two snapshots of the
          # same version apart; os_rev pins the exact commit it was built from.
          desc="malmo v${malmo_version} — hosted cloud image (os@${os_rev}, ${run_id})"
          labels="malmo-image=hosted-cloud,malmo-c2-upload=${run_id},malmo-os-rev=${os_rev},malmo-version=${malmo_version}"

          hcloud-upload-image upload \
            --image-path "$raw.xz" \
            --compression xz \
            --architecture x86 \
            --location nbg1 \
            --description "$desc" \
            --labels "$labels"

          id="$(curl -fsS -G "https://api.hetzner.cloud/v1/images" \
            -H "Authorization: Bearer ${HCLOUD_TOKEN}" \
            --data-urlencode "type=snapshot" \
            --data-urlencode "sort=created:desc" \
            --data-urlencode "label_selector=malmo-c2-upload=${run_id}" \
            | python3 -c 'import sys,json; i=json.load(sys.stdin).get("images",[]); print(i[0]["id"] if i else "")')"
          [ -n "$id" ] || { echo "::error::upload finished but no snapshot found for label malmo-c2-upload=${run_id}"; exit 1; }

          echo "image_id=$id" >> "$GITHUB_OUTPUT"
          # Shared with the release-asset step below so it doesn't xz the
          # same .raw a second time.
          echo "raw_xz=$raw.xz" >> "$GITHUB_OUTPUT"
          {
            echo "### Hosted cloud image published"
            echo ""
            echo "Set this on the control-plane, then deploy:"
            echo ""
            echo '```'
            echo "MALMO_HETZNER_IMAGE=${id}"
            echo '```'
            echo ""
            echo "_description: ${desc}_"
          } >> "$GITHUB_STEP_SUMMARY"

      # ---- attach the image to the tagged GitHub Release (only when requested) ----

      # Every release should carry its own built artifact, not just source —
      # a downstream deployer fetches `malmo-vX.Y.Z-amd64.raw.xz` straight off
      # the Release page and verifies it against the accompanying `.sha256`,
      # with no dependency on any one hosting provider. This reuses the exact
      # `.raw.xz` the step above already produced (`steps.publish.outputs.raw_xz`)
      # rather than compressing the `.raw` a second time.
      #
      # Naming follows BUILD.md # 6's existing per-release artifact scheme
      # (`malmo-vX.Y.Z-amd64.<ext>`, one `vX.Y.Z` from the repo `VERSION`
      # file) — `.raw.xz` names the actual shipped format (raw disk image,
      # xz-compressed) rather than the `.qcow2` that section's cloud-image
      # bullet names, since this lane's build produces `.raw` (mkosi
      # `Format=disk`), not a qcow2 conversion.
      #
      # Tag resolution: `v$(cat VERSION)` matches the tag on both paths that
      # reach here with SHOULD_PUBLISH=true — a human tag push (asserted
      # equal to VERSION by the earlier gate step) and the workflow_call from
      # the release automation (which tags from VERSION by construction
      # before calling this workflow). The create-if-missing fallback only
      # matters for a workflow_dispatch publish run against a commit whose
      # VERSION hasn't been tagged yet.
      - name: Attach image + checksum to the GitHub Release
        if: ${{ env.SHOULD_PUBLISH == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          raw_xz="${{ steps.publish.outputs.raw_xz }}"
          [ -n "$raw_xz" ] && [ -f "$raw_xz" ] || { echo "::error::no compressed image at '${raw_xz:-<unset>}' (expected the Hetzner publish step above to have produced it)"; exit 1; }

          malmo_version="$(cat VERSION)"
          tag="v${malmo_version}"
          asset="malmo-${tag}-amd64.raw.xz"
          checksum="${asset}.sha256"

          cp -- "$raw_xz" "$asset"
          sha256sum -- "$asset" > "$checksum"
          echo "asset: $asset ($(du -h "$asset" | cut -f1))"
          cat "$checksum"

          api="https://api.github.com/repos/${GITHUB_REPOSITORY}"
          gh_curl() { curl -sS -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github+json" "$@"; }

          # Guard against overwriting a canonical release. SHOULD_PUBLISH is also
          # true for a manual workflow_dispatch, which can run against ANY commit
          # while VERSION still names an already-shipped release. If the tag already
          # points at a different commit than this build, refuse rather than clobber
          # that release's image with one built from another source. `/commits/<ref>`
          # follows the tag to its commit; empty when the tag does not exist yet.
          tag_commit="$(gh_curl "${api}/commits/${tag}" | python3 -c 'import sys,json; d=json.load(sys.stdin); print(d.get("sha","") if isinstance(d,dict) else "")')"
          if [ -n "$tag_commit" ] && [ "$tag_commit" != "$GITHUB_SHA" ]; then
            echo "::notice::tag ${tag} points at ${tag_commit}, not this build (${GITHUB_SHA}); skipping Release asset upload to avoid clobbering canonical assets"
            exit 0
          fi

          # Ensure a Release object exists (a bare tag push makes a ref but no
          # Release). Create ONLY on a definitive 404 — a transient or permission
          # error must abort, never be misread as absence, which would fail the
          # create and mask the real cause instead of uploading.
          status="$(gh_curl -o /dev/null -w '%{http_code}' "${api}/releases/tags/${tag}")"
          case "$status" in
            200) echo "release ${tag} exists" ;;
            404)
              echo "no Release for ${tag} yet — creating at ${GITHUB_SHA}"
              gh release create "$tag" --title "$tag" --target "$GITHUB_SHA" --generate-notes
              ;;
            *) echo "::error::release lookup for ${tag} returned HTTP ${status}; aborting rather than treating it as absent"; exit 1 ;;
          esac

          # --clobber: a legitimate re-run against this same commit's tag (e.g.
          # retrying a failed publish) replaces the asset instead of erroring on
          # "already exists".
          gh release upload "$tag" "$asset" "$checksum" --clobber
          echo "attached $asset + $checksum to release $tag"
