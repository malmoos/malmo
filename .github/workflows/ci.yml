# CI gate for every PR into main (and pushes to main).
#
# Scope: the fast brain test pyramid + build, plus the web-ui build. This is
# the CI realization of the fast layers in docs/specs/TESTING.md.
#
# DEFERRED — not wired here (see issue #14 follow-up): the medium/slow boot
# lanes (`make test-boot-chain-nspawn`, `make test-medium-qemu`) need
# privileged runners (systemd-nspawn, QEMU+swtpm) and are coordinated with the
# 0023 boot/storage track. They get their own privileged-runner lane later.
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. force-pushes to a PR branch).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go — test + vet + build
    runs-on: ubuntu-latest
    env:
      # msteinert/pam v2.1.0 uses RTLD_NEXT, a GNU extension that needs
      # _GNU_SOURCE at C compile time (see docs/dev/running-locally.md and the
      # Makefile). Required to build/test the pamverifier package.
      CGO_CFLAGS: -D_GNU_SOURCE
    steps:
      - uses: actions/checkout@v4

      - name: Install PAM headers
        run: sudo apt-get update && sudo apt-get install -y libpam0g-dev

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (full suite incl. pamverifier)
        run: make test

  web-ui:
    name: web-ui — typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web-ui
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: web-ui/.nvmrc
          cache: npm
          cache-dependency-path: web-ui/package-lock.json

      - name: Install dependencies
        run: npm ci

      # `npm run build` runs `vue-tsc --noEmit` (typecheck) then `vite build`.
      - name: Typecheck + build
        run: npm run build
