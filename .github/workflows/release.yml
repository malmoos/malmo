# Auto-tag `main` when a merge bumps the repo-root `VERSION` file, and — only
# on that bump — cut the release: a GitHub Release with auto-generated notes,
# then the hosted cloud-image build+publish.
#
# The VERSION bump IS the release trigger. `docs/dev/contributing.md` #
# Release model: the maintainer bumps VERSION in the dev->main PR; everything
# from here down is automatic. A dev->main merge that does NOT bump VERSION
# (docs-only, a hotfix that doesn't ship a new version yet, etc.) is a silent
# no-op — this workflow still runs, sees the tag for the current VERSION
# already exists, and exits clean without tagging, releasing, or building
# anything. That no-op MUST stay green, not red: most merges to main won't
# bump VERSION, and a failing/red run on every ordinary merge trains people to
# ignore this workflow's status.
#
# Ordering: tag + GitHub Release FIRST, image build+publish SECOND. Rationale
# (deliberately chosen over the reverse):
#   - A git tag names a source commit's version; it doesn't assert "and an
#     image was published from it." Those are separable facts, and BUILD.md's
#     Versioning section already treats the tag as the source-of-truth marker
#     for "this commit is vX.Y.Z" independent of any downstream artifact.
#   - If the tag/release step ran AFTER a successful image build instead, a
#     build failure — or the runner dying mid-build, which can happen on any
#     job (the build is ~10min) — would leave NO tag and NO release for a commit whose
#     VERSION was already bumped and merged to main. The next push to main
#     (if VERSION isn't bumped again) would see the same untagged VERSION and
#     retry the SAME multi-hour build every time until it succeeds, or worse,
#     a following VERSION bump would race past the stuck one and the earlier
#     version would simply never get tagged.
#   - Tagging first means a failed/slow image build is a visibly separate,
#     independently retriable problem (re-run this workflow, or invoke
#     `ci-cloud-image.yml` directly via workflow_dispatch against the tag) —
#     without it blocking the source-level fact that vX.Y.Z exists and what
#     commit it points at. A tag that exists whose image build later fails is
#     a strictly easier incident to recover from (retry the build against a
#     known-good, already-published tag/release) than a successful image
#     published under no tag at all (which commit is it? what do you call it?
#     nothing else in the release process can refer to it).
#
# THE TRAP this design avoids: a tag pushed with the default GITHUB_TOKEN does
# NOT fire another workflow's `push: tags` trigger — GitHub suppresses events
# from GITHUB_TOKEN-authored pushes to prevent recursive workflow runs. So
# this workflow does NOT rely on `ci-cloud-image.yml`'s `push: tags: v*`
# trigger picking up the tag it pushes (it would silently never build or
# publish). Instead it CALLS `ci-cloud-image.yml` directly as a reusable
# workflow (`workflow_call`) with `publish: true`. `ci-cloud-image.yml`'s
# `push: tags` trigger is kept as-is alongside `workflow_call` — it's the
# manual escape hatch for a human pushing a tag by hand, and because the
# GITHUB_TOKEN tag push here never fires it, the two paths cannot double-build
# the same release. See the header comment on `ci-cloud-image.yml` for the
# full reasoning.
name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

# One release decision in flight for main at a time; don't cancel a run that
# might already be mid-tag/mid-release — a cancelled tag-push or release-create
# left half-done is worse than a queued wait.
concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  tag:
    name: Tag + GitHub Release (only if VERSION was bumped)
    runs-on: ubuntu-latest
    outputs:
      created: ${{ steps.decide.outputs.created }}
      tag: ${{ steps.decide.outputs.tag }}
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history + tags: the decide step below compares VERSION against
          # the previous main commit and resolves where an existing tag points.
          # The default depth-1 checkout can do neither.
          fetch-depth: 0

      # Decide whether this merge is a release. THREE outcomes, not two:
      #
      #   - no tag for VERSION       -> cut the release.
      #   - tag exists, VERSION same -> ordinary merge; clean no-op, green.
      #   - tag exists, VERSION bumped -> hard error.
      #
      # That third case is what a plain "does the tag exist?" check gets wrong,
      # and it is not hypothetical. This workflow tags BEFORE building (see the
      # header), so a release whose image build fails leaves the tag behind. If
      # the fix is then merged without deleting that tag, a bare existence
      # check sees the tag, exits green, and the release silently never
      # happens — you merge a release PR, everything is green, and there is no
      # tag movement, no Release, and no image. Bumping VERSION to a version
      # that is already tagged is always a real release that cannot be cut, so
      # say so loudly and say what to do about it.
      - name: Decide whether this merge is a release
        id: decide
        run: |
          set -euo pipefail
          want="v$(cat VERSION)"
          echo "tag=$want" >> "$GITHUB_OUTPUT"

          if ! git ls-remote --exit-code --tags origin "refs/tags/$want" >/dev/null 2>&1; then
            echo "created=true" >> "$GITHUB_OUTPUT"
            echo "release: tag $want does not exist yet — cutting a release at ${GITHUB_SHA}"
            exit 0
          fi

          # The tag exists. Did THIS push change VERSION? github.event.before is
          # main's previous head; on the very first push, a force-push, or a
          # commit where VERSION didn't yet exist it may be absent/unreadable,
          # in which case we fall back to the old skip behaviour but say so.
          before="${{ github.event.before }}"
          prev=""
          if [ -n "$before" ] \
            && [ "$before" != "0000000000000000000000000000000000000000" ] \
            && git cat-file -e "${before}^{commit}" 2>/dev/null; then
            prev="$(git show "${before}:VERSION" 2>/dev/null | tr -d '[:space:]')" || prev=""
          fi
          cur="$(tr -d '[:space:]' < VERSION)"

          if [ -n "$prev" ] && [ "$prev" != "$cur" ]; then
            at="$(git rev-parse --short "refs/tags/$want" 2>/dev/null || echo unknown)"
            echo "::error::VERSION was bumped ($prev -> $cur) but tag $want already exists (at $at). Refusing to skip a real release silently. Delete the stale tag and its GitHub Release and re-run this workflow, or bump VERSION again."
            exit 1
          fi

          if [ -z "$prev" ]; then
            echo "::warning::could not read VERSION at ${before:-<unknown>} to confirm whether this merge bumped it; assuming it did not, since tag $want already exists."
          fi

          echo "created=false" >> "$GITHUB_OUTPUT"
          echo "skip: tag $want already exists and VERSION was not bumped by this merge — nothing to release"

      # Tag the merge commit and open a GitHub Release with auto-generated
      # notes (commits since the previous tag). This uses the default
      # GITHUB_TOKEN, which is exactly why ci-cloud-image.yml cannot rely on
      # its `push: tags` trigger to notice this tag — see the header comment
      # above and on ci-cloud-image.yml.
      - name: Create tag + GitHub Release
        if: steps.decide.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.decide.outputs.tag }}
        run: |
          set -euo pipefail
          git tag "$TAG" "$GITHUB_SHA"
          git push origin "$TAG"
          gh release create "$TAG" --title "$TAG" --target "$GITHUB_SHA" --generate-notes

      - name: Step summary
        env:
          TAG: ${{ steps.decide.outputs.tag }}
          CREATED: ${{ steps.decide.outputs.created }}
        run: |
          {
            if [ "$CREATED" = "true" ]; then
              echo "### Released ${TAG}"
              echo ""
              echo "VERSION was bumped by this merge. Tag \`${TAG}\` pushed, GitHub Release created, and the hosted cloud-image build+publish was triggered (see the \`cloud-image\` job/workflow for its progress)."
            else
              echo "### Skipped — \`${TAG}\` already exists"
              echo ""
              echo "This merge to main did not bump \`VERSION\`. No tag, no release, no image build."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  cloud-image:
    name: Build + publish hosted cloud image
    needs: tag
    if: needs.tag.outputs.created == 'true'
    uses: ./.github/workflows/ci-cloud-image.yml
    with:
      publish: true
    secrets: inherit
