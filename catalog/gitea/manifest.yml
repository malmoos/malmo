id: gitea
manifest_version: 1
name: Gitea
version: "1.26.2"
description:
  short: "A lightweight, self-hosted Git service — your repositories, issues, and pull requests on your own hardware."
  long: |
    Gitea gives you the full code-hosting experience at home: Git repositories with issues, pull requests, a wiki, and releases, served by a single small binary that stays fast on modest hardware. Keep personal projects, dotfiles, and household scripts versioned on a machine you own, and bring existing repositories home with the built-in migrator for GitHub, GitLab, and friends. On first visit Gitea shows its install screen with every setting already filled in — just create your administrator account and finish. Cloning and pushing work over HTTP at the app's molma address; git-over-SSH is disabled because molma routes web traffic only.
icon: ./icon.png
screenshots: [./screenshots/01.png]
categories: [developer-tools]
author:
  name: Gitea
  url: https://about.gitea.com
license: MIT
links:
  homepage: https://about.gitea.com
  source: https://github.com/go-gitea/gitea
  support: https://docs.gitea.com

compose_file: compose.yml
main_service: gitea
main_port: 3000
preferred_slugs: [gitea, git]

# Folderless app: repositories are app-managed content, not use-case-folder
# files — and a git server shouldn't run as the brain's euid. service_user
# gives it a dedicated non-root identity with data/ chowned to it; the
# rootless image is designed for exactly this shape (any UID that owns its
# dirs works).
service_user: true

# /api/healthz is Gitea's own health endpoint (200 + "status":"pass" once the
# DB and cache answer). First boot serves the install screen immediately, so
# 60s comfortably covers the post-install in-place restart too.
health_probe:
  path: /api/healthz
  start_period: 60s

# Idle footprint measured ~95MiB; git operations (clone packing, migrations)
# spike well above it.
resources:
  recommended: { memory: 512M, cpu: 1.0 }

# Everything Gitea owns lives under the two binds: ./data/gitea (repositories,
# LFS objects, attachments, the SQLite database) and ./data/config (app.ini,
# written by the install screen). No separable regenerable cache — back up the
# whole data tree. estimated_size measured at first healthy, post-install:
# 2.3M (an empty Gitea is tiny; repositories grow it).
storage:
  data_volumes: [./data]
  estimated_size: 5M
  app_managed_user_content: true

# internet: outbound HTTP for repository migrations and mirrors (bringing
# repos home from GitHub & co. is a first-class Gitea feature) and the release
# update checker. No LAN egress needed.
permissions:
  internet: true
  lan: false

# Filled by `go run ./cmd/molma manifest resolve catalog/gitea/manifest.yml`.

images:
  gitea/gitea:1.26.2-rootless:
    digest: sha256:c5c21a7705a16f2b2369384a3b7d67c5ed761a818bbb0a55187b5cf98cdc2e68
    download_bytes: 65145006
    disk_bytes: 163267072
