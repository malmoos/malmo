id: open-webui
manifest_version: 1
name: Open WebUI
version: "0.9.6"
description:
  short: "Self-hosted chat interface for large language models."
  long: |
    Open WebUI is a polished, self-hosted chat interface for large language models — a private alternative to the ChatGPT web app that runs on your own hardware. Chat with models, organize conversations into folders, upload documents for retrieval-augmented answers, and manage multiple household users, all from one dashboard.

    Note: this app is the chat front end only — it does not run AI models on this machine yet. You connect it to a model backend of your choice from the in-app Connections settings: an OpenAI-compatible API (OpenAI, OpenRouter, Groq, and others) or an Ollama server running elsewhere on your network. On-device inference needs a dedicated GPU, which malmo does not yet wire through.
icon: ./icon.png
screenshots: [./screenshots/01.png]
categories: [ai, productivity]
author:
  name: Open WebUI
  url: https://openwebui.com
license: Open WebUI License
links:
  homepage: https://openwebui.com
  source: https://github.com/open-webui/open-webui
  support: https://docs.openwebui.com
changelog_url: https://github.com/open-webui/open-webui/releases

compose_file: compose.yml
main_service: open-webui
main_port: 8080
preferred_slugs: [open-webui, chat]

health_probe:
  path: /health
  start_period: 120s

resources:
  recommended: { memory: 2G, cpu: 1.0 }

storage:
  data_volumes: [./data]
  # ./data/cache holds re-fetchable artifacts — the RAG embedding model, plus
  # speech/image generation caches — so it's carved out of backups (regenerable;
  # APP_MANIFEST.md # Storage). The chats/users SQLite DB, uploaded documents,
  # and their vector store stay under data_volumes and are backed up.
  cache_volumes: [./data/cache]
  # Measured app-state baseline at install (APP_MANIFEST.md # Storage): du of
  # ./data the moment /health first passes on a clean boot ≈ 890MB — almost all
  # of it the all-MiniLM-L6-v2 RAG embedding model fetched automatically on first
  # boot (cache/embedding); the SQLite DB and empty vector store are <1MB. Not a
  # usage projection: documents the user later uploads grow it past this.
  estimated_size: 900MB
  app_managed_user_content: true

# Open WebUI signs session JWTs with WEBUI_SECRET_KEY. The brain generates it
# once at install and injects MALMO_SECRET_KEY; the compose maps that to
# WEBUI_SECRET_KEY so the key stays stable across restarts.
secrets:
  - name: key

# internet: reach external OpenAI-compatible model APIs.
# lan: reach an Ollama / OpenAI-compatible inference server elsewhere on the LAN.
permissions:
  internet: true
  lan: true

images:
  ghcr.io/open-webui/open-webui:0.9.6:
    digest: sha256:90eae5b419e40b4c3dd684582b2c83440b36f9ae2f6532c09639b2ba4ee65158
    download_bytes: 1709338172
    disk_bytes: 4846628352
