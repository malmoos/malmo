# Jupyter Notebook via the official jupyter/docker-stacks scipy image
# (quay.io/jupyter/*) — the Jupyter team's own prebuilt layers of this same
# software; scipy-notebook ships the standard data-science stack preinstalled.
# Date tag 2026-06-08 = notebook 7.5.7 / jupyterlab 4.5.8 / python 3.13.
#
# Runs as the bind owner (brain-pinned user:), NOT the image's root-then-su
# startup path: start.sh's chown/NB_UID dance needs root, which the Tier-3
# sandbox (cap_drop: ALL, no-new-privileges) forbids. Started non-root, the
# image skips those permission steps (logged as warnings — expected) and works
# because the home bind is owner-writable. Verified live: clean start as an
# arbitrary non-root UID, kernel cell execution over the WebSocket channel
# through the proxy, notebook files landing in the granted Documents folder.
#
# Auth — first-run setup token, self-disabling. Jupyter's login page only
# offers its "set a new password" form to someone who presents a token, and a
# token fixed in config would stay valid forever alongside the password — a
# permanent backdoor. So the wrapper below gates the first run on a fixed,
# documented setup token (malmo-setup); once the user has set a password
# (Jupyter writes the hash to ~/.jupyter/jupyter_server_config.json in the
# data bind), every later start passes an empty token, which disables token
# auth entirely and leaves the user's password as the only way in. The app is
# never reachable without auth in any state. The token must ride the command
# line and not a config file: CLI flags are traitlets' highest-precedence
# source, so this also can't fight the user's password file.
#
# The served root is the granted Documents subfolder (MALMO_FOLDER_DOCUMENTS,
# interpolated at compose-config time), so notebooks are first-class files in
# ~/Documents; the home bind only carries Jupyter state and pip --user installs.
services:
  jupyter:
    image: quay.io/jupyter/scipy-notebook:2026-06-08
    volumes:
      - ./data:/home/jovyan
    command:
      - bash
      - -c
      - |
        token=malmo-setup
        if grep -qs hashed_password "$$HOME/.jupyter/jupyter_server_config.json"; then token=; fi
        exec start-notebook.py --ServerApp.root_dir="${MALMO_FOLDER_DOCUMENTS}" --IdentityProvider.token="$$token"
