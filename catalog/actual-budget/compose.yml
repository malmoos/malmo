# Actual Budget keeps all of its state — the SQLite budget databases and uploaded
# files — under /data. Upstream's compose published 5006 and bound ./actual-data
# there; malmo drops the host port (the brain routes to main_port) and binds the
# app state under ./data. The image creates a non-root `actual` user and chowns
# /data but never issues USER, so it runs as root upstream; under malmo it runs as
# the elected non-root UID with cap_drop: ALL — a plain Node app needing only write
# access to /data, which the brain pre-creates and chowns to that UID. Upstream's
# compose healthcheck shells `node scripts/health-check.js`, which fetches the
# app's own /health endpoint; malmo probes that same endpoint via the manifest
# health_probe instead, so no compose healthcheck is needed.
services:
  actual-server:
    image: actualbudget/actual-server:26.6.0
    volumes:
      - ./data:/data
