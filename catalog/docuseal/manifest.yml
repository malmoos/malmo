id: docuseal
manifest_version: 1
name: DocuSeal
version: "3.0.2"
description:
  short: "Self-hosted PDF document signing and form filling."
  long: |
    DocuSeal lets you create fillable PDF forms, collect legally-binding e-signatures, and manage the full signing workflow from a single dashboard — without routing documents through a third-party cloud. Build templates with a visual drag-and-drop editor, send signature requests to multiple recipients via email, and download completed PDFs when the workflow is done. Documents and signatures live entirely on your own hardware.

    Note: email-based signing is currently limited. Signature-request links point to this app's local network address, so a recipient can only open them from a device on your home network — links sent to people off your network won't resolve until remote access is available. Use DocuSeal on your LAN, or share completed documents another way.
icon: ./icon.svg
screenshots: [./screenshots/01.png]
categories: [productivity, documents]
author:
  name: DocuSeal LLC
  url: https://www.docuseal.com
license: AGPL-3.0
links:
  homepage: https://www.docuseal.com
  source: https://github.com/docusealco/docuseal
  support: https://www.docuseal.com/docs
changelog_url: https://github.com/docusealco/docuseal/releases

compose_file: compose.yml
main_service: app
main_port: 3000
preferred_slugs: [docuseal, sign]

health_probe:
  path: /up
  start_period: 90s

resources:
  recommended: { memory: 512M, cpu: 1.0 }

storage:
  data_volumes: [./data/app]
  estimated_size: 2GB
  app_managed_user_content: true

services:
  database:
    type: postgres
    version: "16"

permissions:
  internet: true
  lan: false

images:
  docuseal/docuseal:3.0.2:
    digest: sha256:79496b0f121511e72ed9c3ab05eda3f4257b6921eab6b18d6b9121c237a3070c
    download_bytes: 223509551
    disk_bytes: 466961236
