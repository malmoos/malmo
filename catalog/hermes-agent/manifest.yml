id: hermes-agent
manifest_version: 1
name: Hermes Agent
version: v2026.5.29.2
description:
  short: "Self-improving AI agent with messaging gateway, skills system, and web dashboard."
  long: |
    Hermes is an AI agent from Nous Research with a built-in learning loop: it creates skills from experience, searches its own past conversations, and builds a persistent model of the user across sessions. It exposes a web dashboard for chat and configuration, and a messaging gateway that connects to Telegram, Discord, Slack, WhatsApp, and other platforms. LLM provider is user-configured (OpenRouter, OpenAI, Gemini, Ollama, and others).
categories: [productivity, ai]
author:
  name: Nous Research
  url: https://nousresearch.com
license: MIT
links:
  homepage: https://hermes-agent.nousresearch.com/docs/
  source: https://github.com/NousResearch/hermes-agent

# Authoring-only: catalog version-watcher metadata (APP_MANIFEST.md # A2).
# Calendar versioning (year.month.day.build); both compose services run the same
# image off this one tag, so a bump rewrites both. The brain ignores this block.
upstream:
  source: dockerhub
  repo: nousresearch/hermes-agent
  tracks: [nousresearch/hermes-agent]
  version_pattern: '^v(\d{4}\.\d+\.\d+\.\d+)$'

compose_file: compose.yml
main_service: dashboard
main_port: 9119
preferred_slugs: [hermes, hermes-agent]

resources:
  recommended:
    memory: 1G
    cpu: 1.0

storage:
  data_volumes:
    - ./data
  estimated_size: 2GB

permissions:
  internet: true
  lan: false

images:
  nousresearch/hermes-agent:v2026.5.29.2:
    digest: sha256:2bba4ab37729ebdd864d4caf277b24fec4cd8bfc2855185fd9f4c90f9bf7bfa3
    download_bytes: 1133475098
    disk_bytes: 3198076587
