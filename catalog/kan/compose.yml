services:
  migrate:
    image: ghcr.io/kanbn/kan-migrate:0.5.6
    restart: "no"
    environment:
      POSTGRES_URL: ${MOLMA_SERVICE_DATABASE_DSN}

  web:
    image: ghcr.io/kanbn/kan:0.5.6
    environment:
      POSTGRES_URL: ${MOLMA_SERVICE_DATABASE_DSN}
      # Required: a 32+ char random string used to sign auth tokens.
      # molma v1 has no secrets-generation injection; set BETTER_AUTH_SECRET
      # in the instance env before first start.
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      # Required for auth redirects to resolve correctly. Set to the app's
      # molma URL (e.g. http://kan.molma.local) before first start.
      NEXT_PUBLIC_BASE_URL: ${NEXT_PUBLIC_BASE_URL:-}
      # Required for cookie-based credential login on self-hosted installs.
      NEXT_PUBLIC_ALLOW_CREDENTIALS: "true"
      # Optional: Redis DSN for rate limiting (in-memory fallback if unset).
      REDIS_URL: ${REDIS_URL:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Optional: SMTP for email invites and notifications.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      NEXT_PUBLIC_DISABLE_EMAIL: ${NEXT_PUBLIC_DISABLE_EMAIL:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped
