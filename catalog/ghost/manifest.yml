id: ghost
manifest_version: 1
name: Ghost
version: "6.44.1"
description:
  short: "Self-hosted publishing platform for blogs and newsletters."
  long: |
    Ghost is a professional publishing platform — write posts in a clean modern editor, organize them with tags and pages, and run a full website or newsletter from your own server. It powers everything from personal blogs to large publications, with built-in memberships and subscriptions, themes, and a polished admin app at /ghost. Your writing and images live in your own database on your own hardware. molma provisions and manages the MySQL database Ghost requires automatically — nothing to set up. Note: features that send email (staff invites, member sign-up links, password resets, newsletter delivery) need an outgoing mail service configured in Ghost's settings; out of the box the blog, editor, and admin all work without one.
icon: ./icon.svg
screenshots: [./screenshots/01.png]
categories: [publishing, productivity]
author:
  name: Ghost Foundation
  url: https://ghost.org
license: MIT
links:
  homepage: https://ghost.org
  source: https://github.com/TryGhost/Ghost
  support: https://ghost.org/docs/
changelog_url: https://github.com/TryGhost/Ghost/releases

compose_file: compose.yml
main_service: ghost
main_port: 2368
preferred_slugs: [ghost, blog]

# The public site serves 200 once Ghost is up. First boot runs the full schema
# migration against the managed MySQL, so allow a generous start period.
health_probe:
  path: /
  start_period: 180s

resources:
  recommended: { memory: 1G, cpu: 1.0 }

# Ghost owns its content internally — uploaded images, themes, and routes live
# under /var/lib/ghost/content and posts live in the managed database, with no
# external-library option — so it manages its own content (forfeits the
# files-first-class badge) instead of taking a folder grant. The database is
# backed up by the managed-service path, not this bind. estimated_size is the
# measured ./data baseline at first-healthy on a clean install (~75 KB — the
# default themes seed as symlinks; posts live in the database).
storage:
  data_volumes: [./data]
  estimated_size: 1MB
  app_managed_user_content: true

# Ghost requires MySQL 8 in production (no Postgres support; SQLite is
# dev-mode-only). The brain provisions a per-app database in the shared managed
# instance and injects MOLMA_SERVICE_DATABASE_*.
services:
  database:
    type: mysql
    version: "8.0"

# internet: only for features the user opts into later (outgoing mail/newsletter
# delivery via an external provider, update check); the blog itself needs no
# outbound access. lan: not needed — the brain routes inbound traffic.
permissions:
  internet: true
  lan: false

# Filled by `go run ./cmd/molma manifest resolve catalog/ghost/manifest.yml`.
images:
  ghost:6.44.1:
    digest: sha256:5e61e2add86c23121d57f99866ffea0cd21f252ff81ec55e425338bb06de129a
    download_bytes: 259467879
    disk_bytes: 1028196864
