id: paperless-ngx
manifest_version: 1
name: Paperless-ngx
version: "2.20.15"
description:
  short: "Scan, index, and archive your paper documents — searchable, tagged, and filed away."
  long: |
    Paperless-ngx turns your paper pile into a searchable digital archive. Drop a scan, photo, or PDF into the Scans folder inside your Documents and it is picked up within seconds, OCR'd into searchable text, tagged, and filed — the original file is absorbed into the archive, so the folder stays an inbox, not a copy. Office documents (Word, Excel, PowerPoint and their LibreOffice equivalents) and saved emails (.eml) are supported too, converted and indexed on the way in. Find anything later by full-text search, correspondent, document type, or date. molma provisions and manages the PostgreSQL database automatically — nothing to set up. Sign in with username `admin` and password `changemeplease`, and change that password immediately — it is the same on every fresh install. OCR supports only five languages — English, German, Italian, Spanish, and French — and no others can be added in this packaging, so documents in other languages are archived but won't be full-text searchable.
icon: ./icon.png
screenshots: [./screenshots/01.png]
categories: [documents, productivity]
author:
  name: Paperless-ngx
  url: https://docs.paperless-ngx.com
license: GPL-3.0
links:
  homepage: https://docs.paperless-ngx.com
  source: https://github.com/paperless-ngx/paperless-ngx
  support: https://docs.paperless-ngx.com
changelog_url: https://github.com/paperless-ngx/paperless-ngx/releases

compose_file: compose.yml
main_service: webserver
main_port: 8000
preferred_slugs: [paperless, paperless-ngx]

# Unauthenticated → 302 to the login page; any status < 500 counts as
# healthy. First boot runs Django migrations against the managed Postgres
# plus an index build, so allow a generous start period.
health_probe:
  path: /
  start_period: 180s

# OCR (tesseract via celery workers) is the load: parallel consumption spikes
# CPU and the idle footprint is ~530M for the web service alone. The tika
# (JVM, ~155M idle) and gotenberg (~25M idle, but Chromium/LibreOffice spike
# during Office-doc and email conversion) sidecars push the recommendation to
# 3G so a conversion running alongside OCR has headroom.
resources:
  recommended: { memory: 3G, cpu: 2.0 }

# ./data/data is Django state + the search index, ./data/media the archived
# documents (originals + archive PDFs + thumbnails), ./data/export the
# document-exporter target. ./data/redis is the broker's queue snapshot —
# regenerable transient state, excluded from backup via cache_volumes.
# Consumed documents leave the granted folder and live in media from then
# on, so the app manages its own content (forfeits the files-first-class
# badge); the folder grant is the intake path, not the library. Structured
# data (tags, correspondents, metadata) lives in the managed database,
# backed up by the managed-service path, not this bind. ~120KB at first
# healthy; growth tracks the archive.
storage:
  data_volumes: [./data]
  cache_volumes: [./data/redis]
  estimated_size: 1M
  app_managed_user_content: true

# The brain generates this at install and injects it as MOLMA_SECRET_KEY;
# the compose maps it to PAPERLESS_SECRET_KEY (Django session signing).
secrets:
  - name: key

# Paperless-ngx supports Postgres, MariaDB, and SQLite; Postgres is
# upstream's reference setup. The brain provisions a per-app database in the
# shared managed instance and injects MOLMA_SERVICE_DATABASE_*.
services:
  database:
    type: postgres
    version: "16"

# internet: only for features an admin opts into later (mail-rule ingestion
# from an IMAP mailbox, the in-app update check); core consumption and OCR
# need no outbound access. lan: not needed — the brain routes inbound
# traffic. The Documents write grant is the consumption inbox: Paperless
# deletes each original after importing it into the archive.
permissions:
  internet: true
  lan: false
  folders:
    - folder: documents
      mode: write
      scope: pick-subfolder
      default: Scans

