id: memos
manifest_version: 1
name: Memos
version: "0.29.1"
description:
  short: "A lightweight, self-hosted space for quickly capturing notes and ideas in plain Markdown."
  long: |
    Memos is a fast, privacy-first home for your short-form notes — a personal timeline for ideas, snippets, links, and to-dos, all written in plain Markdown. The interface is built for speed: open it, type, done, with no folders to organize and nothing to sync to a third party. Every note lives in your home server's own database with zero telemetry, and full REST and gRPC APIs make it easy to build on top of. It's a single tiny Go binary, so it stays quick even on modest hardware.
icon: ./icon.png
screenshots: [./screenshots/01.png]
categories: [productivity]
author:
  name: Memos
  url: https://www.usememos.com
license: MIT
links:
  homepage: https://www.usememos.com
  source: https://github.com/usememos/memos
  support: https://www.usememos.com/docs

compose_file: compose.yml
main_service: memos
main_port: 5230
preferred_slugs: [memos, notes]
health_probe: /healthz

resources:
  recommended: { memory: 256M, cpu: 0.5 }

# Memos keeps everything it owns — the SQLite database and uploaded attachments —
# under /var/opt/memos, with no separable regenerable cache, so the whole data
# bind is backed up. It stores notes in its own database rather than as files in a
# use-case folder and has no external-library option, so it manages its own
# content (forfeits the files-first-class badge) instead of taking a folder grant.
storage:
  data_volumes: [./data]
  estimated_size: 500M
  app_managed_user_content: true

permissions:
  internet: false
  lan: false

# Filled by `go run ./cmd/molma manifest resolve catalog/memos/manifest.yml`.
images:
  neosmemo/memos:0.29.1:
