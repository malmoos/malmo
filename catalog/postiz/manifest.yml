id: postiz
manifest_version: 1
name: Postiz
version: "2.21.10"
description:
  short: "Schedule and publish social posts across every network from one self-hosted dashboard."
  long: |
    Postiz is an open-source social media scheduler — a self-hosted alternative to Buffer or Hootsuite. Draft a post once, preview how it looks on each network, and schedule it out across many platforms from a single calendar, with an AI assist for copy and images, a team-style approvals flow, and analytics on what landed. Everything runs on your own home server: your drafts, your media, and your connected accounts stay in your database rather than a marketing-SaaS cloud. malmo provisions and manages the PostgreSQL database and Redis cache Postiz needs automatically, and runs its Temporal workflow engine alongside — there is nothing to wire up. On first visit you create your admin account, then connect networks and start scheduling.

    Note on connecting networks: most large platforms (X, LinkedIn, Facebook/Instagram, YouTube, TikTok, Discord, Reddit, Mastodon, …) require you to register your own developer app with them and supply its API keys, which Postiz reads as server configuration. You can paste those keys into this app's configuration form — at install or later under Settings — and the network becomes connectable; leave them blank and that network simply stays disabled. Networks that authenticate with credentials entered directly in Postiz's own interface (such as Bluesky) need no setup at all. A few less common networks (Pinterest, Threads, Slack, and others) aren't on the configuration form yet. Postiz also bakes this app's address into post links, and a few browser conveniences only activate over HTTPS; since that address is your home network's `.local` name, those stay limited to your LAN until remote access ships. The scheduler itself works fully on your network.
icon: ./icon.svg
screenshots: [./screenshots/01.png, ./screenshots/02.png, ./screenshots/03.png]
categories: [productivity]
author:
  name: Postiz (Gitroom)
  url: https://postiz.com
license: AGPL-3.0
links:
  homepage: https://postiz.com
  source: https://github.com/gitroomhq/postiz-app
  support: https://docs.postiz.com
changelog_url: https://github.com/gitroomhq/postiz-app/releases

compose_file: compose.yml
main_service: postiz
main_port: 5000
preferred_slugs: [postiz, social, scheduler]

# Postiz's nginx serves the dashboard on / (a redirect to the login/onboarding
# page; any status < 500 counts as healthy). First boot runs Prisma schema push
# against the managed Postgres and registers Temporal search attributes before
# the node apps listen, and the image is large (~5.7 GB) so the cold start is
# slow — allow a generous start period.
health_probe:
  path: /
  start_period: 240s

# Upstream's tested floor is a dedicated 2 GB-RAM VM. The single Postiz container
# runs nginx + the NestJS backend + the Next.js frontend + workers + cron under
# pm2, and the Temporal dev-server sits alongside; 2.5 GB gives the node stack and
# Temporal headroom on the low-end hardware malmo targets.
resources:
  recommended: { memory: 2560M, cpu: 1.5 }

# ./data/config is Postiz's config plus the pm2 daemon home (HOME=/config);
# ./data/uploads is the local media store for post attachments
# (STORAGE_PROVIDER=local); ./data/temporal is the Temporal dev-server's embedded
# SQLite (workflow state — kept so in-flight schedules survive a restart). Posts,
# connected accounts, and settings live in the managed Postgres, backed up by the
# managed-service path, not these binds. Uploads have no use-case-folder home and
# Postiz offers no external-library path, so it is app-managed content (forfeits
# the files-first-class badge). estimated_size measured at first-healthy on a
# clean boot; growth is user-uploaded media — runtime usage, not projected here.
storage:
  data_volumes: [./data/config, ./data/uploads, ./data/temporal]
  estimated_size: 220M
  app_managed_user_content: true

# Postiz signs its session JWTs with JWT_SECRET and AES-encrypts every stored
# credential (OAuth tokens, Bluesky app-passwords, Mastodon tokens) with
# ENCRYPTION_KEY. Both are generated once at install by the brain and injected as
# MALMO_SECRET_JWT / MALMO_SECRET_ENCRYPTION_KEY; losing either invalidates
# sessions or renders stored credentials unreadable.
secrets:
  - name: jwt
  - name: encryption_key

# User-supplied OAuth credentials for the major social networks. Each is the
# operator's own developer-app key registered with that platform — malmo can't
# generate them and the author can't ship them, so they're collected as config
# fields (APP_MANIFEST.md # D4) and injected verbatim under Postiz's own env-var
# names (no MALMO_* indirection). All optional: Postiz runs fully without any,
# and the in-UI-credential networks (Bluesky, Mastodon-via-login) need none, so
# install is never gated. Networks not listed here (Pinterest, Threads, Slack,
# GitHub, Dribbble, …) await a follow-up. Client IDs/app IDs are non-secret —
# they're public in OAuth redirect URLs, so showing them lets the operator
# confirm what's set; secrets/keys/tokens are masked. Each platform's developer
# console issues these; the OAuth callback is this app's address + the provider's
# path. Targets main_service (postiz) by default — no `service:` needed.
config:
  # X (Twitter)
  - app_env: X_API_KEY
    title: "X (Twitter) — API key"
    description: "Consumer API key from your X developer app (developer.x.com). Required to connect X accounts."
  - app_env: X_API_SECRET
    title: "X (Twitter) — API secret"
    description: "Consumer API secret that pairs with the X API key."
    secret: true

  # Facebook / Instagram
  - app_env: FACEBOOK_APP_ID
    title: "Facebook / Instagram — app ID"
    description: "App ID from a Meta for Developers app (developers.facebook.com). Covers both Facebook Pages and Instagram."
  - app_env: FACEBOOK_APP_SECRET
    title: "Facebook / Instagram — app secret"
    description: "App secret that pairs with the Meta app ID."
    secret: true

  # LinkedIn
  - app_env: LINKEDIN_CLIENT_ID
    title: "LinkedIn — client ID"
    description: "Client ID from a LinkedIn developer app (linkedin.com/developers)."
  - app_env: LINKEDIN_CLIENT_SECRET
    title: "LinkedIn — client secret"
    description: "Client secret that pairs with the LinkedIn client ID."
    secret: true

  # YouTube
  - app_env: YOUTUBE_CLIENT_ID
    title: "YouTube — client ID"
    description: "OAuth client ID from a Google Cloud project with the YouTube Data API enabled (console.cloud.google.com)."
  - app_env: YOUTUBE_CLIENT_SECRET
    title: "YouTube — client secret"
    description: "OAuth client secret that pairs with the YouTube client ID."
    secret: true

  # TikTok
  - app_env: TIKTOK_CLIENT_ID
    title: "TikTok — client key"
    description: "Client key from a TikTok developer app (developers.tiktok.com)."
  - app_env: TIKTOK_CLIENT_SECRET
    title: "TikTok — client secret"
    description: "Client secret that pairs with the TikTok client key."
    secret: true

  # Discord
  - app_env: DISCORD_CLIENT_ID
    title: "Discord — client ID"
    description: "Application client ID from the Discord developer portal (discord.com/developers)."
  - app_env: DISCORD_CLIENT_SECRET
    title: "Discord — client secret"
    description: "Client secret that pairs with the Discord client ID."
    secret: true
  - app_env: DISCORD_BOT_TOKEN_ID
    title: "Discord — bot token"
    description: "Bot token for the Discord application (the Bot tab of your app)."
    secret: true

  # Reddit
  - app_env: REDDIT_CLIENT_ID
    title: "Reddit — client ID"
    description: "Client ID from a Reddit 'web app' (reddit.com/prefs/apps)."
  - app_env: REDDIT_CLIENT_SECRET
    title: "Reddit — client secret"
    description: "Client secret that pairs with the Reddit client ID."
    secret: true

  # Mastodon
  - app_env: MASTODON_URL
    title: "Mastodon — instance URL"
    description: "Base URL of the Mastodon instance to register the app against. Defaults to mastodon.social."
    default: "https://mastodon.social"
  - app_env: MASTODON_CLIENT_ID
    title: "Mastodon — client key"
    description: "Client key from your Mastodon app (Preferences → Development on your instance)."
  - app_env: MASTODON_CLIENT_SECRET
    title: "Mastodon — client secret"
    description: "Client secret that pairs with the Mastodon client key."
    secret: true

# Postgres holds all Postiz data (posts, connected accounts, settings); Redis
# backs the BullMQ queues that drive scheduled publishing. The brain provisions
# both per-app in its shared managed instances and injects MALMO_SERVICE_DATABASE_*
# / MALMO_SERVICE_CACHE_*, which the compose maps onto DATABASE_URL / REDIS_URL.
# `redis: "7"` normalizes to the BSD-3 Valkey 8 engine (RESP/ACL-compatible).
services:
  database:
    type: postgres
    version: "16"
  cache:
    type: redis
    version: "7"

# internet: Postiz reaches the social networks' APIs to publish posts and fetch
# link previews and media. lan: not needed — the brain routes inbound traffic.
permissions:
  internet: true
  lan: false

