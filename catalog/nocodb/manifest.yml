id: nocodb
manifest_version: 1
name: NocoDB
version: "2026.06.1"
description:
  short: "Turn your data into collaborative spreadsheets — a self-hosted Airtable alternative."
  long: |
    NocoDB turns a database into a fast, collaborative spreadsheet: organize records across grid, gallery, kanban, calendar, and form views, link tables into relationships, and share or embed views without writing code. It works as a no-code app builder for trackers, CRMs, inventories, content calendars, and project boards your whole household can edit together, and exposes a REST API over everything you build. malmo provisions and manages the Postgres database and Redis cache NocoDB needs automatically — there is nothing to set up.

    Note about email: invite, share, and notification links are built from this app's local network address, so they only open from a device on your home network until remote access is available. NocoDB's email features (member invites, notifications) work on your LAN once an administrator adds an outgoing email account in malmo and binds it to this app; everything else works without one.
icon: ./icon.png
screenshots: [./screenshots/01.png, ./screenshots/02.png, ./screenshots/03.png]
categories: [productivity, database]
author:
  name: NocoDB Inc
  url: https://nocodb.com
# Source-available, not OSI. NocoDB relicensed from AGPL-3.0 to the
# Sustainable Use License (effective 2026-01-29): self-host for personal /
# internal / non-commercial use is permitted (malmo's model); offering it
# commercially as a hosted service for others is not.
license: Sustainable Use License
links:
  homepage: https://nocodb.com
  source: https://github.com/nocodb/nocodb
  support: https://docs.nocodb.com
changelog_url: https://github.com/nocodb/nocodb/releases

compose_file: compose.yml
main_service: nocodb
main_port: 8080
preferred_slugs: [nocodb, tables]

# NocoDB's own readiness endpoint (200 when the API is up). First boot runs
# schema migrations against the managed Postgres, so allow a generous start
# period before probing counts against health.
health_probe:
  path: /api/v1/health
  start_period: 90s

resources:
  recommended: { memory: 2G, cpu: 1.0 }

# ./data is /usr/app/data — NocoDB's tool dir, where it stores uploaded
# attachments. Measured empty (~0) at first healthy: all structured data
# (bases, tables, rows), tokens, and plugin config live in the managed
# Postgres database, backed up via the managed-service path, and logs go to
# stdout — the bind grows only as users upload attachments. NocoDB owns its
# attachment store internally with no external-library model, so this is
# app-managed content, not a use-case folder grant.
storage:
  data_volumes: [./data]
  estimated_size: 20MB
  app_managed_user_content: true

# Database + cache are malmo-managed. Postgres holds all of NocoDB's metadata
# and base data; Redis (provisioned as the Valkey engine) backs caching and
# cross-worker job coordination. The brain injects MALMO_SERVICE_DATABASE_*
# and MALMO_SERVICE_CACHE_* (a redis:// DSN).
services:
  database:
    type: postgres
    version: "16"
  cache:
    type: redis
    version: "7"

# NocoDB sends member invites and notifications by email when bound to an
# outgoing-mail provider — the compose maps MALMO_MAIL_* onto NC_SMTP_*.
# Unbound, NocoDB's SMTP plugin stays uninitialized and the app runs.
mail:
  optional: true

# internet: NocoDB connects out to external SMTP for mail and to external
# (cloud) databases when a user adds one as a data source. lan: not needed —
# the brain routes inbound traffic; connecting to a database on the local
# network is an opt-in power-user case not granted by default.
permissions:
  internet: true
  lan: false

images:
  nocodb/nocodb:2026.06.1:
    digest: sha256:e5a6ac9cfa59f78b333b491efde4b6cd60bb866b49c76daf92295ef359ef710e
    download_bytes: 218682181
    disk_bytes: 813790208
