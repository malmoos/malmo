# Blinko adapted for malmo's Tier-3 sandbox (cap_drop: ALL, no-new-privileges,
# brain-pinned user:). Upstream's compose runs blinko + its own postgres:14 and
# publishes 1111; malmo drops the host port (the brain routes to main_port),
# drops the bundled database and declares managed Postgres in the manifest
# instead, and binds the app's state dir (/app/.blinko) under ./data.
#
# Verified live under the sandbox at a pinned non-root identity (uid 2100,
# cap_drop ALL): Prisma migrations + seed run against the managed-style DSN,
# the seed creates .blinko/{files,plugins,pgdump,vector} owned by the pinned
# UID, and the server answers 200 on :1111. No default account is seeded in
# production — the first registered user becomes the superadmin. Re-verify on
# version bumps.
services:
  blinko:
    image: blinkospace/blinko:1.8.7
    environment:
      NODE_ENV: production
      # Auth-token signing secret (the NEXTAUTH_ name survives from Blinko's
      # earlier Next.js stack). Generated per-instance by the brain (manifest
      # `secrets: [{name: auth}]`) and injected as MALMO_SECRET_AUTH; stable
      # across restarts so sessions survive.
      NEXTAUTH_SECRET: ${MALMO_SECRET_AUTH}
      DATABASE_URL: ${MALMO_SERVICE_DATABASE_DSN}
    volumes:
      - ./data:/app/.blinko
