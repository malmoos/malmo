# Windmill adapted for malmo's Tier-3 sandbox (cap_drop: ALL, no-new-privileges,
# brain-pinned user:). Upstream runs windmill_server + a 3-replica windmill_worker
# pool + a native worker alongside a bundled postgres:16, an EE indexer, an LSP
# "extra" sidecar, and a Caddy L4 proxy that publishes host ports 80 + 25.
#
# malmo adaptations:
#   - Drop the bundled `db: postgres:16`; declare managed Postgres in the manifest
#     and map its DSN onto Windmill's single DATABASE_URL.
#   - Drop the bundled `caddy` proxy (it holds host ports 80:80 / 25:25 — the brain
#     routes ingress to main_port 8000; the :25 email-trigger SMTP listener is
#     dropped, an optional feature).
#   - Drop `windmill_indexer` (upstream replicas: 0; EE full-text job/log search).
#   - Drop `windmill_extra` (optional combined LSP + interactive-debugger sidecar,
#     :latest tag — the editor loses autocomplete and the optional DAP debugger;
#     scripts still run).
#   - Worker pool 3 -> 1 (single-node home box).
#   - Drop `privileged: true` + `FAVOR_UNSHARE_PID` on the worker (upstream ships
#     both active): Tier-3 runs cap_drop: ALL, so Windmill's in-worker nsjail/PID
#     job sandbox — already off-by-default in Windmill unless configured — stays
#     off. Scripts/flows/schedules/apps/webhooks all run; only the `# sandbox
#     <image>` and legacy `# docker` step types are disabled (see Platform gaps).
#   - Never mount /var/run/docker.sock (legacy `# docker` mode = full host access).
#   - Named volumes -> a single relative ./data bind for the worker dependency
#     cache (regenerable). All durable state (scripts, flows, resources, job
#     results, schedules) lives in the managed Postgres database.
#
# No depends_on / container healthcheck is needed: the brain provisions and waits
# for the managed Postgres to be ready *before* this stack starts, and Windmill
# runs its schema migrations under a Postgres advisory lock, so the server and
# both workers connect to the ready database independently and race-safely (this
# mirrors upstream, where the workers depend on `db`, not on the server). malmo's
# manifest `health_probe` (GET /api/version) drives app-routing health.
#
# Env rewiring (the brain injects the values; the compose maps them to Windmill's
# own names):
#   DATABASE_URL -> ${MALMO_SERVICE_DATABASE_DSN}  (managed Postgres 16)
#
# IMPORTANT — this app is currently withdrawn from the store (manifest `listed:
# false`). The connecting role owns its database but is not a superuser and lacks
# CREATEROLE. Windmill's early `CREATE ROLE windmill_admin/windmill_user` migrations
# are exception-wrapped, so they silently no-op without CREATEROLE — but a later
# UNGUARDED migration (20221211192539) does `GRANT ... TO windmill_admin` and
# hard-fails because the role was never created, so windmill_server crash-loops on
# managed Postgres. See the manifest banner and the managed-pg-role-creation entry
# in docs/dev/catalog-import-gaps.md.
services:
  windmill_server:
    image: ghcr.io/windmill-labs/windmill:1.739.0
    environment:
      DATABASE_URL: ${MALMO_SERVICE_DATABASE_DSN}
      MODE: server
    restart: unless-stopped

  windmill_worker:
    image: ghcr.io/windmill-labs/windmill:1.739.0
    environment:
      DATABASE_URL: ${MALMO_SERVICE_DATABASE_DSN}
      MODE: worker
      WORKER_GROUP: default
    volumes:
      - ./data/worker-cache:/tmp/windmill/cache
    restart: unless-stopped

  # The "native" worker group runs lightweight in-process jobs (REST/GraphQL/
  # dedicated SQL connectors) — much cheaper than the subprocess jobs the default
  # group runs, so upstream keeps a dedicated one. Same image, no dependency
  # cache (native jobs install nothing).
  windmill_worker_native:
    image: ghcr.io/windmill-labs/windmill:1.739.0
    environment:
      DATABASE_URL: ${MALMO_SERVICE_DATABASE_DSN}
      MODE: worker
      WORKER_GROUP: native
      NATIVE_MODE: "true"
      SLEEP_QUEUE: "200"
    restart: unless-stopped
