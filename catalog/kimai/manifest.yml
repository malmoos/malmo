id: kimai
manifest_version: 1
name: Kimai
version: "2.59.0"
description:
  short: "Time-tracking for freelancers and teams — log hours, manage projects, export invoices."
  long: |
    Kimai is a professional time-tracker: log working hours against customers, projects, and activities, then turn them into reports, exports, and invoices. It supports multiple users with roles and team permissions, so a household or a small business can share one instance. molma provisions and manages the MySQL database Kimai requires automatically — nothing to set up. Sign in with username `admin` and password `changemeplease`, and change that password immediately — it is the same on every fresh install. Features that send email (password resets, scheduled reports) additionally need an outgoing mail server configured by an administrator; everything else works without one.
icon: ./icon.png
categories: [productivity]
author:
  name: Kimai Community
  url: https://www.kimai.org
license: AGPL-3.0
links:
  homepage: https://www.kimai.org
  source: https://github.com/kimai/kimai
  support: https://www.kimai.org/documentation/
changelog_url: https://github.com/kimai/kimai/releases

compose_file: compose.yml
main_service: kimai
main_port: 8001
preferred_slugs: [kimai, time-tracking]

# Unauthenticated → redirects to locale/login (200 after redirect); any
# status < 500 counts as healthy. First boot runs ~75 schema migrations plus
# a Symfony cache warm-up against the managed MySQL, so allow a generous
# start period.
health_probe:
  path: /
  start_period: 180s

resources:
  recommended: { memory: 1G, cpu: 1.0 }

# ./data is /opt/kimai/var — the app's Symfony state dir: the persisted
# APP_SECRET (sessions break if it's lost), invoice and export templates,
# logs, and a prod cache that dominates the measured baseline (~50 MB at
# first healthy on a clean install). Timesheet data itself lives in the
# managed database, backed up by the managed-service path, not this bind.
storage:
  data_volumes: [./data]
  estimated_size: 64MB

# Kimai is MySQL/MariaDB-only (Doctrine + pdo_mysql; no Postgres, no
# SQLite-prod mode). The brain provisions a per-app database in the shared
# managed instance and injects MOLMA_SERVICE_DATABASE_*.
services:
  database:
    type: mysql
    version: "8.4"

# internet: only for features an admin opts into later (outgoing mail via an
# external provider, the in-app update check); core time-tracking needs no
# outbound access. lan: not needed — the brain routes inbound traffic.
permissions:
  internet: true
  lan: false

images:
  kimai/kimai2:2.59.0:
    digest: sha256:c955507585f791ac410025095d887bb9fbbba4f497aa3410e6a1b40b5879a93e
    download_bytes: 300086308
    disk_bytes: 887843328
