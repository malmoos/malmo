id: listmonk
manifest_version: 1
name: Listmonk
version: "6.1.0"
description:
  short: "Self-hosted newsletter and mailing list manager."
  long: |
    listmonk is a high-performance newsletter and mailing list manager that runs entirely on your own hardware. Build and segment subscriber lists, design campaigns in a visual editor, send to thousands of recipients, and track opens and clicks — without handing your audience or your content to a third-party email-marketing service. A single fast Go binary backs a modern dashboard, and malmo provisions and manages the PostgreSQL database it needs automatically, so there is nothing to set up. On the first visit you create the super-admin account, then add your SMTP server inside listmonk to start sending.

    Note on outgoing email: listmonk does not use malmo's shared Outgoing email settings. It manages its own SMTP servers in its own interface (Settings → SMTP), where you enter your mail provider's host, port, and credentials directly. This is a listmonk design choice — its mail configuration lives only in its own database, not in environment malmo can supply — so the malmo-wide email account you may have set for other apps does not apply here.

    Note: listmonk bakes this app's address into every outbound email — unsubscribe, click-tracking, view-in-browser, and archive links. Because that address is your home network's `.local` name, recipients off your network can't open those links until remote access is available. Sending still works; only the links back into listmonk are reachable on your LAN for now.
icon: ./icon.svg
screenshots: [./screenshots/01.png]
categories: [productivity, marketing]
author:
  name: Kailash Nadh
  url: https://listmonk.app
license: AGPL-3.0
links:
  homepage: https://listmonk.app
  source: https://github.com/knadh/listmonk
  support: https://listmonk.app/docs/
changelog_url: https://github.com/knadh/listmonk/releases

compose_file: compose.yml
main_service: app
main_port: 9000
preferred_slugs: [listmonk, newsletter]

# `/` is listmonk's public subscription page — a clean 200 once the server is
# up (the JSON /api/health route is session-gated). First boot runs the
# idempotent schema install + any migrations against the freshly provisioned
# managed Postgres before the server listens, so allow a modest start period.
health_probe:
  path: /
  start_period: 60s

resources:
  recommended: { memory: 512M, cpu: 1.0 }

# listmonk's subscriber, campaign, and template data lives in the managed
# Postgres database (backed up by the managed-service path, not attributed
# here). The only app bind is ./uploads — media an admin uploads to embed in
# campaigns when Settings -> Media is pointed at the filesystem provider. It
# has no use-case-folder home, so it is app-managed content (forfeits the
# files-first-class badge and triggers the install-time warning).
# estimated_size: the uploads bind is empty at first-healthy (measured on a
# clean install); growth is admin-uploaded media, which is runtime usage and
# deliberately not projected here.
storage:
  data_volumes: [./uploads]
  app_managed_user_content: true

# listmonk is Postgres-only. The brain provisions a per-app database in the
# shared managed instance and injects MALMO_SERVICE_DATABASE_*, which the
# compose maps onto listmonk's discrete LISTMONK_db__* connection params.
services:
  database:
    type: postgres
    version: "16"

# internet: outbound SMTP to the admin's mail provider (campaigns), plus the
# in-app new-version check and any remote media/links. lan: not needed — the
# brain routes inbound traffic.
permissions:
  internet: true
  lan: false

images:
  listmonk/listmonk:v6.1.0:
    digest: sha256:179d00d9553c371b6fe88c9b145095d651e275bdd66db46b2e0b79daff316b6f
    download_bytes: 14765837
    disk_bytes: 33068032
