# Author's compose, held verbatim by molma. Same traefik/whoami image as the
# whoami sample, but listening on 8080 so it runs as the elected non-root UID
# under cap_drop: ALL. The brain injects MOLMA_FOLDER_DOCUMENTS (the in-container
# path of the bound Documents folder); a real files-first-class app would map it
# to its library path (e.g. PHOTOPRISM_ORIGINALS_PATH). whoami just echoes it.
services:
  files-demo:
    image: traefik/whoami:v1.10.3
    command: ["--port=8080"]
    environment:
      WHOAMI_DOCUMENTS_PATH: ${MOLMA_FOLDER_DOCUMENTS}
