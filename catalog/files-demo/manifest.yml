id: files-demo
manifest_version: 1
name: Files Demo
version: "1.10"
description:
  short: "whoami wired to a use-case folder — proves the folder-enforcement override path."
compose_file: compose.yml
main_service: files-demo
main_port: 8080
preferred_slugs: [files-demo]

permissions:
  internet: false
  lan: false
  # Declares read access to the Documents folder. An install resolves the source
  # (personal ~/Documents or household /srv/molma/shared/Documents) and the
  # override gets user:, a bind mount at /molma/documents, group_add for a shared
  # source, and an injected MOLMA_FOLDER_DOCUMENTS. whoami ignores the mount; the
  # app exists to exercise the enforcement path end-to-end (APP_ISOLATION.md #
  # User content). Listens on 8080 (not 80) so it runs cleanly as a non-root
  # elected UID under cap_drop: ALL.
  folders:
    - folder: documents
      mode: read

# Catalog-promised image digest (APP_STORE.md # Trust model), shared with the
# whoami sample since it's the same image.
images:
  traefik/whoami:v1.10.3:
    digest: sha256:43a68d10b9dfcfc3ffbfe4dd42100dc9aeaf29b3a5636c856337a5940f1b4f1c
    download_bytes: 2850040
    disk_bytes: 2853860
