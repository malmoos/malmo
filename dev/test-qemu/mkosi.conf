# Medium-lane test image (slice 0021): bookworm rootfs bootable under
# QEMU+swtpm, with our dist/systemd units and the storage-verify binary
# baked in. SSH-accessible for in-VM assertions driven from the host.
#
# Scope: scaffolding only. The image is *not* LUKS-encrypted in this
# slice — proving the QEMU+swtpm+SSH+systemd userspace plumbing works
# end-to-end is the goal. LUKS root + first-boot TPM enrollment +
# second-boot unseal verification lands in slice 0022 layered on top.
# TPM hardware *is* exposed to the VM (via -tpmdev tpm-crb in the host
# driver), so `tpm2_pcrread` inside the VM proves the TPM plumbing is
# live even before we exercise the seal/unseal path.
#
# This config is read by `mkosi build` invoked from
# dev/test-qemu/bootstrap.sh. The resulting disk image is booted under
# QEMU by run-medium-tests.sh.

[Distribution]
Distribution=debian
Release=bookworm

[Output]
Format=disk
ImageId=malmo-medium
OutputDirectory=../../.dev/qemu

[Build]
CacheDirectory=../../.dev/qemu/cache
# Build a side "tools" image containing recent systemd (incl. repart),
# zstd, etc. and use it as the toolchain for the main image build. Lets
# mkosi build current bookworm images on hosts with older systemd
# (Ubuntu focal ships systemd 245; mkosi needs >=254). Adds ~2 min to
# the first build, cached thereafter.
ToolsTree=default

[Content]
Bootable=yes
Bootloader=systemd-boot
# Console on virtio serial so the QEMU `-serial file:...` driver in
# run-medium-tests.sh captures kernel + systemd output for diagnostics.
# Without console=ttyS0 the kernel logs to tty0 and the serial.log file
# stays empty after the EFI stub hands off.
# forward_to_console keeps the full boot log in serial.log for debugging.
# root= and rd.luks.uuid= are NOT here (slice 0023) — they go in
# /etc/kernel/cmdline, written by bootstrap.sh with the LUKS UUID it
# computes from the pinned root partition UUID (see mkosi.repart/
# 10-root.conf). mkosi prepends /etc/kernel/cmdline to this line when
# it builds the UKI. We can't use gpt-auto to discover the encrypted
# root: gpt-auto needs block devices enumerated at generator time, but
# virtio_blk only loads later (it's in the concatenated modules-initrd,
# coldplugged by udev). rd.luks.uuid= instead makes
# systemd-cryptsetup-generator emit a unit with a .device dependency
# that *waits* for udev — the encrypted analogue of 0021's explicit
# root= fix. First boot unlocks via the cryptsetup.passphrase systemd
# credential (supplied over SMBIOS by run-medium-tests.sh; consumed by
# the mkosi-initrd's systemd-cryptsetup@.service ImportCredential
# drop-in). Second boot unlocks via the PCR-7-bound TPM2 token with no
# credential present.
# ttyS0 must be LAST so /dev/console = ttyS0; journald ForwardToConsole
# writes to /dev/console — if tty0 is last we lose all journal output
# in the serial log (kernel messages still come through because the
# kernel writes to all listed consoles, but journald does not).
KernelCommandLine=console=tty0 console=ttyS0 systemd.journald.forward_to_console=1 rw
# Build a separate modules initrd and concatenate it with the main initrd.
# virtio.*: virtio_blk + virtio_pci + virtio_net (disk and network visible).
# ext4/jbd2/mbcache: ext4 is a module on the Debian 6.1 amd64 kernel
# (not built-in); without these three, sysroot.mount fails with
# "unknown filesystem type 'ext4'".
KernelModulesInitrd=yes
KernelModulesInitrdInclude=virtio.*
KernelModulesInitrdInclude=ext4
KernelModulesInitrdInclude=jbd2
KernelModulesInitrdInclude=mbcache
# ext4 needs CRC32c for metadata checksums; crc32c_intel (hw, SSE4.2)
# or crc32c_generic (sw fallback) — include both, kernel picks the right one.
KernelModulesInitrdInclude=crc32c.*
# LUKS root (slice 0023): the device-mapper crypt target plus the cipher
# primitives systemd-cryptsetup pulls in. dm-crypt is the target;
# aes/xts/sha* are the default LUKS2 cipher+hash. Without dm-mod the
# initrd cannot open the LUKS volume at all.
#
# IMPORTANT — separator: every KernelModulesInitrdInclude value is wrapped
# as `re:<value>` (mkosi's parse_kernel_module_filter_regexp) and matched
# with re.search against the module *file path*, which uses HYPHENS
# (kernel/drivers/md/dm-mod.ko) — with no underscore normalization for the
# regex path (that normalization only applies to the glob form,
# KernelInitrdModules). So `dm_mod`/`dm_crypt` (underscores) silently match
# nothing: depmod metadata still lists the module, but the .ko file is
# excluded, and at boot `modprobe dm_mod` fails ENOENT ("No such file or
# directory") → "Cannot initialize device-mapper" → emergency. Use a
# `[-_]` class so the pattern matches the on-disk hyphenated name (and
# stays robust if a kernel ever ships the underscore form).
KernelModulesInitrdInclude=dm[-_]crypt
KernelModulesInitrdInclude=dm[-_]mod
KernelModulesInitrdInclude=aes.*
KernelModulesInitrdInclude=xts
KernelModulesInitrdInclude=sha256.*
KernelModulesInitrdInclude=sha512.*
# network-manager + avahi-daemon + avahi-utils: the #130 network-state
# slice (NM-derived LAN set, per-interface announcement, allow-interfaces
# sync, IP-change replay) is asserted in-VM on the second boot. NM manages
# only the two extra NICs; the SSH NIC stays on systemd-networkd (MAC
# split in mkosi.postinst.chroot) so the LUKS boot phases are untouched.
Packages=
        linux-image-amd64
        systemd
        systemd-sysv
        systemd-boot
        tpm2-tools
        cryptsetup
        openssh-server
        ca-certificates
        dbus
        util-linux
        kmod
        udev
        iproute2
        network-manager
        avahi-daemon
        avahi-utils
        bash
        less
        grep
        sed
        gawk
        coreutils

# Bake everything from ./mkosi.extra/ into the image at its in-tree
# path. bootstrap.sh populates this dir with: dist/systemd/ units at
# /etc/systemd/system/, our storage-verify binary at /usr/lib/malmo/,
# /root/.ssh/authorized_keys, and an sshd config drop-in.
ExtraTrees=mkosi.extra

# Runs after package install + tree copy, before image finalization.
# Enables the malmo storage-ready target and ensures our reporter runs
# during boot. See dev/test-qemu/mkosi.postinst.chroot.
# .chroot extension = mkosi v27+ chroot-mode script: runs inside the
# image (`/` = image root). Cleaner than the host-mode .sh which would
# need every path prefixed with $BUILDROOT.
PostInstallationScripts=mkosi.postinst.chroot

# Root password is intentionally not set. Login is key-only (sshd config
# drop-in in mkosi.extra/ disables PasswordAuthentication). Acceptable
# for an ephemeral test image; never copy this posture to production.
# (mkosi v27 dropped [Validation] Password=; the absence of a Password
# directive leaves /etc/shadow with no password set — same effect.)

[Runtime]
# Used by `mkosi qemu` direct invocation (we don't use that path; the
# real qemu invocation lives in run-medium-tests.sh which controls
# swtpm and SSH port-forwarding). Kept here as documentation.
KVM=yes
RAM=1G
