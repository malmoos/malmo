# Medium-lane test image (slice 0021): bookworm rootfs bootable under
# QEMU+swtpm, with our dist/systemd units and the storage-verify binary
# baked in. SSH-accessible for in-VM assertions driven from the host.
#
# Scope: scaffolding only. The image is *not* LUKS-encrypted in this
# slice — proving the QEMU+swtpm+SSH+systemd userspace plumbing works
# end-to-end is the goal. LUKS root + first-boot TPM enrollment +
# second-boot unseal verification lands in slice 0022 layered on top.
# TPM hardware *is* exposed to the VM (via -tpmdev tpm-crb in the host
# driver), so `tpm2_pcrread` inside the VM proves the TPM plumbing is
# live even before we exercise the seal/unseal path.
#
# This config is read by `mkosi build` invoked from
# dev/test-qemu/bootstrap.sh. The resulting disk image is booted under
# QEMU by run-medium-tests.sh.

[Distribution]
Distribution=debian
Release=bookworm

[Output]
Format=disk
ImageId=malmo-medium
OutputDirectory=../../.dev/qemu
CacheDirectory=../../.dev/qemu/cache

[Content]
Bootable=yes
Bootloader=systemd-boot
Packages=
        systemd
        systemd-sysv
        systemd-boot
        tpm2-tools
        openssh-server
        ca-certificates
        dbus
        util-linux
        kmod
        udev
        iproute2
        bash
        less
        grep
        sed
        gawk
        coreutils

# Bake everything from ./mkosi.extra/ into the image at its in-tree
# path. bootstrap.sh populates this dir with: dist/systemd/ units at
# /etc/systemd/system/, our storage-verify binary at /usr/lib/malmo/,
# /root/.ssh/authorized_keys, and an sshd config drop-in.
ExtraTrees=mkosi.extra

# Runs after package install + tree copy, before image finalization.
# Enables the malmo storage-ready target and ensures our reporter runs
# during boot. See dev/test-qemu/mkosi.postinst.
PostInstallationScripts=mkosi.postinst

[Validation]
# Empty root password — login is key-only via authorized_keys. Acceptable
# for an ephemeral test image; never copy this posture to production.
Password=

[Host]
# Used by `mkosi qemu` direct invocation (we don't use that path; the
# real qemu invocation lives in run-medium-tests.sh which controls
# swtpm and SSH port-forwarding). Kept here as documentation.
QemuKvm=yes
QemuMem=1G
