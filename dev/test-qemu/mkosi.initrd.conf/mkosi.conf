# Override config for mkosi's *default initrd* (slice 0023).
#
# mkosi builds a minimal systemd initrd for the bootable image. When a
# `mkosi.initrd.conf` directory exists next to the main mkosi.conf,
# mkosi parses it as extra configuration for that initrd build (see
# `finalize_default_initrd` in mkosi/config.py and `mkosi.initrd.conf`
# in mkosi.1). Its `mkosi.extra/` is auto-detected and copied into the
# initrd root.
#
# Why we need this: the default initrd *includes* dm-mod/dm-crypt as
# modules (mkosi-initrd's KernelModules= list) but never *loads* them.
# It relies on `/dev/mapper/control` autoloading dm_mod on first open —
# a chain that does not complete before systemd-cryptsetup@ runs in our
# QEMU image, so the LUKS unlock dies with "Cannot initialize
# device-mapper. Is dm_mod kernel module loaded?" and the box drops to
# emergency. Forcing the modules in via modules-load.d (consumed by
# systemd-modules-load.service, ordered Before=sysinit.target, i.e.
# before any cryptsetup activation) is exactly what Debian's
# initramfs-tools cryptsetup hook and dracut's rd.driver.pre do.
#
# The .ko files themselves arrive via the main image's
# KernelModulesInitrd concatenation (mkosi.conf KernelModulesInitrd*);
# this drop-in only ensures they are loaded.
#
# No [Content] ExtraTrees= is needed: mkosi auto-detects `mkosi.extra/`
# in this config dir as an extra tree (config.py extra_trees
# path_suffixes). Listing it explicitly would add it twice.
