# Force-load the device-mapper core + dm-crypt target in the initrd so
# systemd-cryptsetup@ can open the LUKS root (slice 0023). Without this
# the modules are present in the initrd but never loaded — the
# /dev/mapper/control autoload does not fire before cryptsetup runs, and
# the unlock fails with "Cannot initialize device-mapper. Is dm_mod
# kernel module loaded?". systemd-modules-load.service reads this file
# (Before=sysinit.target, i.e. before cryptsetup activation).
dm_mod
dm_crypt
