# Encrypted root — LUKS2 over ext4. This is the whole point of slice
# 0023: prove STORAGE.md # Encryption posture (ext4 + LUKS, TPM-auto-
# unlock against PCR 7) against a real kernel + real (software) TPM.
#
# Encrypt=key-file: systemd-repart formats the partition as LUKS2 and
# enrolls keyslot 0 from the passphrase in dev/test-qemu/mkosi.passphrase
# (auto-detected by mkosi; generated by bootstrap.sh, mode 0600). That
# keyslot is the "recovery passphrase" of STORAGE.md — the only key that
# exists at build time. First boot unlocks via it (supplied as a
# systemd credential over SMBIOS by run-medium-tests.sh); the first-boot
# enrollment service then adds a TPM2 keyslot bound to PCR 7.
[Partition]
Type=root
Format=ext4
CopyFiles=/
Encrypt=key-file
# Size for the control-plane image set (#163). The storage-only image used
# Minimize=guess to shrink to ~content size, but the medium-lane image now bakes
# the control-plane tarballs (~130 MB) under /var/lib/malmo AND docker-loads
# them into /var/lib/docker at first boot (the loaded layers roughly double the
# on-disk footprint), on top of the docker-ce packages. Minimize would leave no
# runtime headroom for that load. Fix the root partition at 8 GiB (sparse — the
# raw image only consumes blocks actually written) so first-boot `docker load`
# (and M2's whoami app image) has room. GrowFileSystem defaults on, so the ext4
# inside the LUKS volume fills the partition.
SizeMinBytes=8G
# Pin the GPT partition UUID so the LUKS header UUID is deterministic:
# systemd-repart derives it as v4(HMAC-SHA256(key=partition_uuid,
# msg="luks-uuid")). bootstrap.sh computes that value and bakes
# rd.luks.uuid=<it> into the kernel cmdline so the initrd's
# systemd-cryptsetup-generator builds a unit that *waits* for the root
# device (gpt-auto can't — it needs block devices enumerated at
# generator time, before the virtio modules-initrd is coldplugged).
UUID=10101010-1010-4010-8010-101010101010
