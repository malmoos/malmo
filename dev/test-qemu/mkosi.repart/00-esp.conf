# ESP — holds the systemd-boot bootloader + UKI(s). Unencrypted by
# necessity (firmware reads it pre-decryption). Mirrors mkosi's default
# bootable partitioning; we only define it explicitly because providing
# mkosi.repart/ at all takes over partitioning fully (slice 0023).
[Partition]
Type=esp
Format=vfat
CopyFiles=/boot:/
CopyFiles=/efi:/
SizeMinBytes=512M
SizeMaxBytes=512M
