# malmo control-plane compose — the stack the brain brings up after host-agent
# launches the brain (CONTROL_PLANE.md # host-agent launches the brain
# container; # the dashboard UI is a brain-launched container). Authored in M0
# (#163); the brain consumes it in M1b via lifecycle.EnsureControlPlane.
#
# Two containers — the *services* the brain owns and reconciles:
#   caddy        — LAN-facing reverse proxy. The brain drives it via the admin
#                  API at malmo-caddy:2019 over the malmo network and publishes
#                  the catch-all + dashboard + per-app routes there
#                  (CONTROL_PLANE.md # Caddy). The bootstrap caddy.json only opens
#                  the admin endpoint and the catch-all; everything else is added
#                  live via the API.
#   malmo-ui     — static SPA server; Caddy routes all non-/api traffic here
#                  (WEB_UI.md # deploy model). Read-only, no ports, no secrets.
#
# The docker-socket-proxy is deliberately NOT in this compose: it is the brain's
# sole Docker *transport*, and a process cannot bring up its own only path to
# Docker. host-agent (which holds the raw socket) seeds the network + proxy
# before launching the brain (internal/hostagent/brainlaunch.EnsureTransport);
# the brain reaches Docker through it at tcp://docker-proxy:2375. The proxy image
# still ships in the offline bundle so host-agent can docker-load it. See
# socket-proxy-compose-validation.md.
services:
  caddy:
    image: caddy:2-alpine
    container_name: malmo-caddy
    restart: unless-stopped
    command: ["caddy", "run", "--config", "/etc/caddy/caddy.json"]
    volumes:
      - ./caddy.json:/etc/caddy/caddy.json:ro
    ports:
      - "80:80"
      - "443:443"
    networks:
      - malmo

  malmo-ui:
    image: malmo-ui:dev
    container_name: malmo-ui
    restart: unless-stopped
    read_only: true
    # caddy writes its storage/autosave under /data and /config on startup; with
    # a read-only root those writes error out (harmless for HTTP-only static
    # serving, but noisy). tmpfs gives it scratch space without a persistent
    # mount — the bundle is baked at /srv/ui, nothing here needs to persist.
    tmpfs:
      - /data
      - /config
    networks:
      - malmo

# The malmo network is seeded by host-agent (brainlaunch.EnsureTransport) before
# the brain starts; reference it as external so this compose attaches to it
# rather than racing to create it.
networks:
  malmo:
    name: malmo-ingress
    external: true
