# Test-only catalog app for the hosted cloud access-mode lane (#308). A minimal
# routing app: traefik/whoami echoes the HTTP request it received, so the lane can
# prove the per-app forward-auth gate + Cookie-strip end-to-end through real Caddy
# (an unauthenticated GET to a restricted app 302s to the box login; the owner's
# forward-auth cookie proxies through; the app upstream never sees the Cookie
# header). Deliberately NO folder grant — the appliance lane's whoami
# (dev/test-qemu/catalog/whoami) carries a documents:write grant to exercise bind
# mounts, but the access-mode proof only cares about routing, so this stays a pure
# routing app with the fewest install failure modes.
#
# Same image + catalog-promised digest as the appliance lane: the cloud test image
# bakes that one image into the offline bundle and installs air-gapped
# (MALMO_OFFLINE_INSTALL), so the promised digest is the trust anchor
# (APP_LIFECYCLE.md # image digest pinning).
id: whoami
manifest_version: 1
name: Whoami
version: "1.10"
description:
  short: "Tiny HTTP server that echoes request info — a routing smoke test."
icon_glyph: flask-conical
compose_file: compose.yml
main_service: whoami
main_port: 80
preferred_slugs: [whoami, hello]

permissions:
  internet: false
  lan: false

images:
  traefik/whoami:v1.10.3:
    digest: sha256:43a68d10b9dfcfc3ffbfe4dd42100dc9aeaf29b3a5636c856337a5940f1b4f1c
    download_bytes: 2850040
    disk_bytes: 6581646
