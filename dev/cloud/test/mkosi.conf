# malmo hosted cloud-image BOOT-PROOF image (C2, #205).
#
# This is the lean hosted image (dev/cloud/mkosi.conf, C1b) PLUS the runtime
# instrumentation needed to actually boot a control plane and assert it serves:
# the baked control-plane image bundle, the slim host-agent + its units, the
# systemd-networkd single-NIC config, and a first-boot self-check that writes its
# verdict to the serial console (dev/cloud/run-cloud-tests.sh drives the boot).
#
# It `Include=`s the lean image definition rather than copying it, so the booted
# image — and the qcow2 artifact converted from it — is the lean image plus
# instrumentation, never a divergent rebuild (the boot proof must validate the
# real lean cut, ENVIRONMENT.md # How the profile is realized). The lean target
# `make build-cloud-image` still builds dev/cloud/ with NO postinst/control-plane
# (it asserts the lean package cut); this directory adds the boot machinery via
# its own auto-detected mkosi.postinst.chroot + mkosi.extra/ (staged at build
# time by run-cloud-tests.sh) without touching the lean config.
#
# NOT the appliance medium lane (dev/test-qemu): no swtpm, no LUKS root, no
# NetworkManager/Avahi, no installer/kiosk — "the disk IS the installed system"
# (ENVIRONMENT.md # Provisioning). The control-plane bake mechanism is reused
# verbatim from the medium lane (TESTING.md # Full-stack control-plane
# integration): `make control-plane-images` tarballs + load-control-plane-images
# + malmo-load-images.service.

[Include]
Include=..

[Output]
# Keep the boot image out of the lean image's output dir (.dev/cloud) so the two
# never clobber each other. Path resolves relative to this file's directory.
OutputDirectory=../../../.dev/cloud-boot

[Build]
# Override the inherited CacheDirectory too (the lean config points it at
# .dev/cloud/cache). Both the output and the cache must live under the
# .dev/cloud-boot dir that run-cloud-tests.sh creates + chowns to the caller —
# otherwise mkosi (running as the caller) tries to create .dev/cloud under the
# root-owned .dev (created by `make control-plane-images`) and hits EPERM.
CacheDirectory=../../../.dev/cloud-boot/cache
