[Partition]
Type=root
Format=ext4
CopyFiles=/
# Fix the root partition at exactly 8 GiB (Min == Max). mkosi sizes the disk to
# fit the declared partitions, so this is effectively fixed today; pinning Max too
# makes "8 GiB" true even if a partition is added before root or systemd-repart is
# pointed at a larger disk. Sparse on disk — the raw only consumes written blocks.
SizeMinBytes=8G
SizeMaxBytes=8G
# Pin the GPT partition UUID so the kernel cmdline's root=PARTUUID=... (mkosi.conf)
# is deterministic — the initrd mounts the root by this UUID rather than relying
# on systemd gpt-auto discovery (which needs an EFI loader variable that is not
# set in this boot path). GrowFileSystem defaults on, so the ext4 fills the
# partition; the PARTUUID is stable across the grow.
UUID=20202020-2020-4020-8020-202020202020
