# BIOS Boot Partition (#277). Required for the GRUB BIOS boot path that
# BiosBootloader=grub (mkosi.conf) adds so the image boots on legacy-BIOS
# providers (Hetzner CX / Intel) as well as UEFI ones (CPX / AMD). On a GPT disk
# there is no MBR gap for GRUB's core.img, so it must live in a partition of this
# well-known type; grub-bios-setup embeds core.img here and writes boot.img to the
# protective MBR. mkosi's own default-for-BIOS partitioning lays down exactly this
# (05-bios, 1 MiB, this type GUID) — we replicate it because providing
# mkosi.repart/ at all takes over partitioning fully (00-esp, 05-bios, 10-root).
#
# The ESP (00-esp.conf) stays 512M: mkosi's default bumps the ESP to 1G only for
# grub-EFI images (which duplicate each kernel/initrd onto the ESP because they
# can't use UKIs). Here the UEFI path is systemd-boot and the kernel sits on the
# ESP once — the BIOS grub.cfg menuentry references those same files — so 512M is
# unchanged and ample. No Format=: the partition holds raw core.img, not a
# filesystem.
[Partition]
Type=21686148-6449-6e6f-744e-656564454649
SizeMinBytes=1M
SizeMaxBytes=1M
