# malmo hosted cloud-image profile (C1b, #203).
#
# The lean cloud-VM image definition for the *hosted* environment profile
# (ENVIRONMENT.md # How the profile is realized — "A lean cloud image
# profile"). It is NOT the appliance rootfs with services disabled: it is its
# own mkosi image that installs only what a cloud VM needs and never installs
# the appliance's LAN/storage machinery (absent, not disabled). mkosi stays the
# single image builder for every target (BUILD.md # 2, DECISIONS.md 2026-06-16);
# this is a second image *definition*, not a second builder.
#
# Scope (C1b): the image definition + lean package set + the `hosted` marker +
# a build target. It deliberately does NOT bake host-agent/brain bring-up (the
# slim cloud host-agent is #204/C1c) or the control-plane images + QEMU boot
# proof (#205/C2). A shared base between this and a future appliance product
# image is a deliberate later refactor, not this slice.
#
# Read by `mkosi build` from dev/cloud/bootstrap.sh, which stages the Docker
# apt repo into the auto-detected mkosi.pkgmngr/ tree first. Output is a raw
# GPT disk image; qcow2 packaging + the boot proof land in #205/C2.

[Distribution]
Distribution=debian
# Debian 13 "Trixie" — the locked product base (BUILD.md # 1), NOT the test
# lane's bookworm. The QEMU test lane pins bookworm for its proven LUKS/TPM
# path; the shipping cloud image tracks the locked stable base.
Release=trixie

[Output]
Format=disk
ImageId=malmo-cloud
OutputDirectory=../../.dev/cloud
# Emit a JSON package manifest next to the image so the build can assert the
# lean cut list (no network-manager/avahi/samba/mergerfs/cryptsetup/tpm2-tools)
# without mounting the image — bootstrap.sh parses it post-build.
ManifestFormat=json

[Build]
CacheDirectory=../../.dev/cloud/cache
# Side "tools" image carrying a recent systemd (incl. systemd-repart, which
# mkosi uses to lay down the GPT disk even with default partitioning), so the
# build works on hosts whose own systemd is too old. Same pattern as the test
# lane; adds ~2 min to the first build, cached after.
ToolsTree=default

[Content]
Bootable=yes
Bootloader=systemd-boot
# psi=1 is REQUIRED on the product image (BUILD.md # 1): Debian builds the
# kernel CONFIG_PSI=y but CONFIG_PSI_DEFAULT_DISABLED=y, so without it the
# `ram-pressure` health detector (HEALTH.md) reads zeros = a false all-clear.
# The test lane omits it; the product image must not (#205/C2 asserts PSI is
# live). console=ttyS0 last → /dev/console is the serial port the cloud
# hypervisor captures for headless boot diagnostics. rw: mutable Debian (A/B
# immutable is deferred, BUILD.md # 2).
#
# root=PARTUUID pins the root explicitly rather than relying on systemd's
# gpt-auto root discovery. gpt-auto needs the boot loader to set the
# LoaderDevicePartUUID EFI variable, which is not set in this firmware/boot path
# (the initrd's gpt-auto-generator logs "EFI loader partition unknown, exiting"
# and switch-root then fails into emergency mode). The PARTUUID is pinned in
# mkosi.repart/10-root.conf so it is deterministic. (The medium lane likewise
# passes an explicit root= — via rd.luks for its encrypted root.)
KernelCommandLine=console=tty0 console=ttyS0 psi=1 rw root=PARTUUID=20202020-2020-4020-8020-202020202020
# Separate modules-initrd so the initrd finds a virtio root disk + mounts ext4
# on a cloud hypervisor. The LUKS/dm-crypt cipher modules the test lane carries
# are intentionally absent — there is no LUKS root here (# Storage: no LUKS/TPM;
# encryption-at-rest is provider/KMS-keyed, out of this slice).
KernelModulesInitrd=yes
KernelModulesInitrdInclude=virtio.*
KernelModulesInitrdInclude=ext4
KernelModulesInitrdInclude=jbd2
KernelModulesInitrdInclude=mbcache
KernelModulesInitrdInclude=crc32c.*

# The lean cloud-VM minimum (ENVIRONMENT.md # Assumption inventory). Explicitly
# NOT here (the cuts — bootstrap.sh asserts their absence against the manifest):
# network-manager, avahi-daemon/avahi-utils, samba, mergerfs, cryptsetup,
# tpm2-tools, and the appliance SSH posture (openssh-server + nftables). SSH is
# off in hosted v1 (no LAN to scope it to); public exposure is the cloud
# provider's security-group concern (DECISIONS.md 2026-06-19).
Packages=
        linux-image-amd64
        systemd
        systemd-sysv
        systemd-boot
# The actual EFI executables (/usr/lib/systemd/boot/efi/systemd-bootx64.efi) that
# mkosi's Bootloader=systemd-boot installs to the ESP. On trixie these live in a
# separate systemd-boot-efi package that `systemd-boot` only *Recommends*, and
# mkosi builds with Install-Recommends=false — so without listing it explicitly
# the build fails with "a systemd-boot binary was not found". (The medium lane is
# bookworm, whose systemd-boot packaging bundles the binary, so it never hit this.)
        systemd-boot-efi
        ca-certificates
        dbus
        util-linux
        kmod
        udev
        iproute2
        sudo
# Shadow utilities (useradd/groupadd/usermod/gpasswd/chpasswd). REQUIRED, and
# easy to miss: on the appliance/medium image these arrive transitively (the
# openssh-server / network-manager / avahi postinsts pull adduser+passwd), but
# the hosted image cuts all of those, so it must depend on passwd explicitly.
# Without it docker-ce's postinst (`groupadd docker`) fails the build, and at
# runtime host-agent's user management (useradd/chpasswd/gpasswd for /setup +
# user CRUD — USERS_AND_GROUPS.md) and the malmo-identity provisioning in the
# boot-proof postinst have no tools.
        passwd
        bash
        less
        grep
        sed
        gawk
        coreutils
# Time-zone database. REQUIRED for the first-run wizard's time-zone step: that
# step is a real pass-through to host-agent `timedatectl set-timezone`, which
# rejects any zone not present under /usr/share/zoneinfo. systemd only *Recommends*
# tzdata and mkosi builds with Install-Recommends=false, so without listing it
# explicitly the lean image ships no zoneinfo and the wizard's tz step 502s on a
# real hosted box (surfaced by the cloud end-to-end test, #209/C5).
        tzdata
# Docker — the control plane and apps run on it — from Docker's official apt
# repo (BUILD.md # Docker package source), wired in via the auto-detected
# mkosi.pkgmngr/ tree that bootstrap.sh populates with Docker's sources.list +
# signing key (trixie pocket). Build-time repo only; the VM never apt-installs.
        docker-ce
        docker-ce-cli
        containerd.io
        docker-compose-plugin

# Bake the profile marker. /etc/malmo/profile = "hosted" is exactly the file
# the brain reads at startup (#202/C1a, internal/profile.Read) to select the
# hosted seams (e.g. skip mDNS publish). A static one-line file committed under
# mkosi.extra/ — unlike the test lane, whose mkosi.extra is generated.
ExtraTrees=mkosi.extra

# mkosi.repart/ defines a minimal unencrypted ESP + ext4 root (no LUKS/TPM —
# # Storage: encryption-at-rest is provider/KMS-keyed). It is REQUIRED, not
# optional: with no repart definitions systemd-repart grows the root to fill the
# whole build disk (a ~1 TiB root → ~17 GiB of ext4 inode tables written at build
# time → "No space left on device"). The root is fixed at 8 GiB (sparse — the raw
# only consumes written blocks; GrowFileSystem fills the partition) to leave first
# boot's `docker load` of the baked control-plane images runtime headroom, same
# sizing as the medium lane. The test lane additionally encrypts its root (LUKS);
# this profile does not. (C1b shipped no repart on an untested assumption that the
# mkosi default was a sane bounded layout; #205/C2's first real build corrected it.)

# Root password intentionally unset (mkosi leaves /etc/shadow with no password).
# There is no interactive console login surface in hosted v1 (SSH off; operator
# access is a hosting concern); admin identity is PAM/dashboard (#206/C3a).

[Runtime]
# Documentation only. The real qemu invocation + boot proof (#205/C2) lives in
# dev/cloud/run-cloud-tests.sh, which boots an instrumented superset of this lean
# image (dev/cloud/test/, Include=..) — not this config directly.
KVM=yes
RAM=1G
