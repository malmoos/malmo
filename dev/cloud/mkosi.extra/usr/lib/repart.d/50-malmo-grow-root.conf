# Hosted cloud image — RUNTIME grow of the root partition to fill the provider
# disk. Read by systemd-repart at boot (malmo-grow-root.service), NOT at build:
# mkosi's build-time layout lives in dev/cloud/mkosi.repart/ and pins the root at
# a fixed 8 GiB so the shipped image stays small (sparse). A provider VM has a far
# larger disk (e.g. 80 GB) than that baked 8 GiB, and nothing grew the partition
# onto it — so the box ran on 8 GiB, docker image storage + the brain's SQLite
# store shared it, and one ordinary app install filled it and 500'd login.
#
# systemd-repart matches this definition to the single existing root partition (by
# Type=root) and, because no SizeMaxBytes caps it, extends it to consume all free
# space on the disk. GrowFileSystem=yes sets the GPT GROWFS attribute bit on the
# partition, which is what systemd-growfs-root.service normally watches for — but
# that unit is only wired up by systemd-gpt-auto-generator when booted with
# root=gpt-auto, which cloud providers (Hetzner included) do not use; they pass an
# explicit root=PARTUUID=... instead. So on a real provider box this flag alone
# does not grow the filesystem: malmo-grow-root.service calls systemd-growfs
# directly as a second step (see that unit) rather than relying on this flag being
# noticed by anything. No Format= on purpose: the partition already holds the
# populated ext4, and omitting Format keeps systemd-repart from ever treating it
# as empty. The ESP has no definition here, so it is left untouched.
[Partition]
Type=root
GrowFileSystem=yes
