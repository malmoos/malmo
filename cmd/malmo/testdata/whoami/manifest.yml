id: whoami
manifest_version: 1
name: Whoami
version: "1.10"
description:
  short: "Tiny HTTP server that echoes request info — a routing smoke test."
icon_glyph: flask-conical
compose_file: compose.yml
main_service: whoami
main_port: 80
preferred_slugs: [whoami, hello]

permissions:
  internet: false
  lan: false

# Catalog-promised image digests (APP_STORE.md # Trust model). The brain
# refuses to install if the registry-resolved digest doesn't match. Hand-
# curated for the skeleton; signed-JSON catalog + CI resolution land later.
images:
  traefik/whoami:v1.10.3:
    digest: sha256:43a68d10b9dfcfc3ffbfe4dd42100dc9aeaf29b3a5636c856337a5940f1b4f1c
    download_bytes: 2850040
    disk_bytes: 6581646
