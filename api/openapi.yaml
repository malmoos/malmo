info:
  title: malmo brain
  version: 0.0.1
openapi: 3.1.0
paths:
  /api/v1/apps:
    get:
      operationId: list-apps
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/List-appsResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List installed app instances
    post:
      operationId: install-app
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Install-appRequest"
        required: true
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
          description: Accepted
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Install an app (job)
  /api/v1/apps/custom:
    post:
      operationId: install-custom-app
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Install-custom-appRequest"
        required: true
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
          description: Accepted
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Install a user-pasted (Door-2) compose (job)
  /api/v1/apps/custom/inspect:
    post:
      operationId: inspect-custom-app
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Inspect-custom-appRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Inspect-custom-appResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: "Inspect a pasted (Door-2) compose: service names + best-effort main port (admin-only, read-only)"
  /api/v1/apps/custom/overlay/parse:
    post:
      operationId: parse-custom-overlay
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Parse-custom-overlayRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Parse-custom-overlayResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Parse + validate an Edit-as-YAML Door-2 permissions overlay back to form fields (admin-only)
  /api/v1/apps/custom/overlay/render:
    post:
      operationId: render-custom-overlay
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Render-custom-overlayRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Render-custom-overlayResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Render elected Door-2 permissions as the Edit-as-YAML overlay (admin-only)
  /api/v1/apps/{id}:
    delete:
      operationId: uninstall-app
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
          description: Accepted
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Uninstall an app (job)
    get:
      operationId: get-app
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstanceDTO"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Get one app instance
  /api/v1/apps/{id}/mail-binding:
    put:
      operationId: set-app-mail-binding
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Set-app-mail-bindingRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Bind an app to an outgoing-mail provider (empty provider_id unbinds)
  /api/v1/apps/{id}/secrets:
    get:
      operationId: get-app-secrets
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AppSecretsDTO"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Reveal an app instance's owner-visible setup secrets (owner or admin)
  /api/v1/apps/{id}/start:
    post:
      operationId: start-app
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
          description: Accepted
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Start a stopped app instance (job)
  /api/v1/apps/{id}/stop:
    post:
      operationId: stop-app
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
          description: Accepted
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Stop a running app instance (job)
  /api/v1/audit:
    get:
      operationId: list-audit
      parameters:
        - explode: false
          in: query
          name: limit
          schema:
            default: 50
            format: int64
            type: integer
        - explode: false
          in: query
          name: after_id
          schema:
            format: int64
            type: integer
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/List-auditResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Paginated audit log; admins see all rows, members see their own
  /api/v1/auth/elevate:
    post:
      operationId: elevate
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ElevateRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ElevateResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Re-verify password and enter the 5-minute elevation window (auth required)
  /api/v1/auth/state:
    get:
      operationId: auth-state
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Auth-stateResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Probe whether the box has any users yet (public)
  /api/v1/auth/users:
    get:
      operationId: auth-users
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Auth-usersResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List users for the login picker (public)
  /api/v1/catalog:
    get:
      operationId: list-catalog
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/List-catalogResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List installable apps from the catalog
  /api/v1/catalog/{id}:
    get:
      operationId: get-catalog-app
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Detail"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Full detail-page view of one catalog app
  /api/v1/catalog/{id}/install-plan:
    get:
      operationId: get-install-plan
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InstallPlanDTO"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Permission/scope plan for installing a catalog app
  /api/v1/health:
    get:
      operationId: list-health-issues
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthListResponseBody"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List active health issues
  /api/v1/jobs/{id}:
    get:
      operationId: get-job
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Get job status
  /api/v1/login:
    post:
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
          description: OK
          headers:
            Set-Cookie:
              schema:
                type: string
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Authenticate against PAM via host-agent; mint a session
  /api/v1/logout:
    post:
      operationId: logout
      responses:
        "204":
          description: No Content
          headers:
            Set-Cookie:
              schema:
                type: string
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: Revoke the current session
  /api/v1/mail-providers:
    get:
      operationId: list-mail-providers
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/List-mail-providersResponse"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
          description: Error
      summary: List outgoing-mail providers (admin only)
    post:
      operationId: create-mail-provider
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MailProviderBody"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MailProviderDTO"
          description: OK
        default:
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/ErrorModel"
